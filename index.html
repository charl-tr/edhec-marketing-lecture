<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Marketing Research Methods · EDHEC · Fiches de révision</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --burgundy:#5E1937;
  --burgundy-dark:#3F0F23;
  --burgundy-light:#7A2447;
  --yellow:#F7C642;
  --green:#00B894;
  --red:#C0392B;
  --bg:#FAFAF7;
  --cream:#EFEAE0;
  --ink:#1A1A1A;
  --muted:#6B6B6B;
  --border:#E8E2D8;
  --border-strong:#D4CCBE;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Montserrat',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.55;
  font-size:16px;
  font-weight:400;
}
::selection{background:var(--yellow);color:var(--ink)}
img{max-width:100%;display:block}

/* HEADER */
header.app-header{
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:18px 32px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;top:0;z-index:100;
  gap:24px;
}
.brand{display:flex;align-items:center;gap:14px}
.brand-mark{
  width:40px;height:40px;
  background:var(--burgundy);
  display:grid;place-items:center;
  color:#fff;font-weight:900;font-size:20px;
  letter-spacing:-0.05em;
}
.brand-text h1{
  font-size:13px;font-weight:800;color:var(--burgundy);
  text-transform:uppercase;letter-spacing:0.08em;
  line-height:1.2;
}
.brand-text .sub{
  font-size:10px;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.12em;
  font-weight:500;margin-top:2px;
}
.search-wrap{position:relative;flex:1;max-width:380px}
.search{
  width:100%;
  background:var(--bg);
  border:1px solid var(--border);
  padding:11px 14px 11px 38px;
  font-family:inherit;font-size:13px;
  color:var(--ink);
  font-weight:500;
  transition:.15s;
}
.search:focus{outline:none;border-color:var(--burgundy);background:#fff}
.search::placeholder{color:var(--muted);font-weight:400}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}
.exam-countdown{
  font-size:11px;font-weight:700;color:var(--burgundy);
  text-transform:uppercase;letter-spacing:0.1em;
  border-left:3px solid var(--yellow);
  padding-left:12px;
  white-space:nowrap;
}
.exam-countdown small{display:block;color:var(--muted);font-weight:500;letter-spacing:0.05em;margin-top:2px;font-size:9px}

/* NAV */
nav.app-nav{
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:0 32px;
  display:flex;
  gap:0;
  overflow-x:auto;
  position:sticky;top:79px;z-index:99;
}
nav.app-nav button{
  background:none;border:none;
  padding:14px 20px;
  font-family:inherit;
  font-size:11px;font-weight:700;
  color:var(--muted);
  text-transform:uppercase;letter-spacing:0.1em;
  cursor:pointer;
  border-bottom:3px solid transparent;
  white-space:nowrap;
  transition:.15s;
  position:relative;
}
nav.app-nav button:hover{color:var(--burgundy)}
nav.app-nav button.active{color:var(--burgundy);border-bottom-color:var(--burgundy)}
nav.app-nav button .badge{
  display:inline-block;
  background:var(--yellow);
  color:var(--ink);
  font-size:9px;
  padding:1px 5px;
  margin-left:6px;
  font-weight:800;
  vertical-align:middle;
}

/* MAIN */
main{max-width:1100px;margin:0 auto;padding:40px 32px 80px}
.view{display:none;animation:fadeIn .25s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* TYPOGRAPHY */
h2.session-title{
  font-size:42px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:-0.01em;
  line-height:1.05;
  color:var(--burgundy);
  margin-bottom:8px;
}
.session-meta{
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.12em;
  font-weight:600;
  margin-bottom:32px;
  padding-bottom:24px;
  border-bottom:1px solid var(--border);
}
.session-meta strong{color:var(--burgundy)}
h3.section-title{
  font-size:13px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:0.12em;
  color:var(--burgundy);
  margin:48px 0 16px;
  padding-left:12px;
  border-left:3px solid var(--burgundy);
}
h4.subsection-title{
  font-size:18px;
  font-weight:700;
  color:var(--ink);
  margin:24px 0 10px;
}
p{margin-bottom:14px;color:var(--ink)}
p.lede{font-size:17px;color:var(--muted);font-weight:400;margin-bottom:24px;line-height:1.6}
ul,ol{padding-left:22px;margin-bottom:14px}
li{margin:6px 0}
strong{font-weight:700}
em{font-style:italic;color:var(--burgundy-dark)}
code{font-family:'JetBrains Mono',monospace;font-size:13px;background:var(--cream);padding:2px 6px;color:var(--burgundy-dark)}

/* SURLIGNAGE — bordeaux transparent, sobre */
.hl{background:rgba(94,25,55,0.10);padding:2px 5px;font-weight:700;color:var(--burgundy-dark);box-decoration-break:clone;-webkit-box-decoration-break:clone}
.hl-strong{background:rgba(94,25,55,0.18);padding:2px 5px;font-weight:700;color:var(--burgundy-dark)}

/* CARDS */
.card{
  background:#fff;
  border:1px solid var(--border);
  padding:24px 28px;
  margin:16px 0;
  transition:.2s;
}
.card.accent{border-left:4px solid var(--burgundy)}
.card.warn{border-left:4px solid var(--yellow)}
.card.tip{border-left:4px solid var(--green)}
.card:hover{box-shadow:0 4px 16px rgba(94,25,55,.06);transform:translateY(-1px)}
.card .label{
  font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.15em;
  color:var(--burgundy);
  margin-bottom:8px;
}
.card.warn .label{color:#9c7400}
.card.tip .label{color:#006b56}

/* PEDAGOGICAL CALLOUTS */
.callout{
  border:1px solid var(--border-strong);
  padding:18px 22px;
  margin:18px 0;
  background:#fff;
  position:relative;
}
.callout::before{
  content:'';
  position:absolute;
  left:0;top:0;bottom:0;width:4px;
}
.callout.intuition::before{background:var(--burgundy)}
.callout.example::before{background:var(--green)}
.callout.warning::before{background:var(--yellow)}
.callout.test::before{background:var(--burgundy-dark)}
.callout-label{
  font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.18em;
  color:var(--burgundy);
  margin-bottom:8px;
  display:flex;align-items:center;gap:8px;
}
.callout.warning .callout-label{color:#9c7400}
.callout.example .callout-label{color:#006b56}

/* TABLES */
table{
  width:100%;
  border-collapse:collapse;
  margin:18px 0;
  font-size:14px;
  background:#fff;
  border:1px solid var(--border);
}
th,td{
  padding:12px 14px;
  text-align:left;
  border-bottom:1px solid var(--border);
  vertical-align:top;
}
th{
  background:var(--burgundy);
  color:#fff;
  font-weight:700;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.08em;
}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:#fdfcf9}

/* IMAGES (slides extraites) */
.slide-img{
  border:1px solid var(--border);
  margin:18px 0;
  background:#fff;
  padding:8px;
}
.slide-caption{
  font-size:11px;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.1em;
  font-weight:600;
  margin-top:-8px;margin-bottom:18px;
}

/* HOMEPAGE */
.hero{
  background:var(--burgundy);
  color:#fff;
  padding:48px 40px;
  margin-bottom:32px;
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:0;right:0;
  width:80px;height:40px;background:var(--yellow);
}
.hero::after{
  content:'';position:absolute;top:40px;right:80px;
  width:40px;height:24px;background:var(--burgundy-dark);
}
.hero h1{
  font-size:56px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:-0.02em;
  line-height:0.95;
  margin-bottom:12px;
}
.hero .tag{
  font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.18em;
  opacity:0.8;margin-bottom:16px;
}
.hero p{font-size:18px;color:rgba(255,255,255,.9);font-weight:400;max-width:600px;margin:0}

/* PROGRESS DASHBOARD */
.progress-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:16px;
  margin:24px 0;
}
.progress-card{
  background:#fff;
  border:1px solid var(--border);
  padding:20px;
  text-align:center;
  cursor:pointer;
  transition:.2s;
}
.progress-card:hover{border-color:var(--burgundy);transform:translateY(-2px)}
.progress-ring{
  width:80px;height:80px;margin:0 auto 12px;
  position:relative;
}
.progress-ring svg{transform:rotate(-90deg)}
.progress-ring circle{fill:none;stroke-width:6}
.progress-ring .bg{stroke:var(--cream)}
.progress-ring .fg{stroke:var(--burgundy);stroke-linecap:square;transition:stroke-dashoffset 1s ease}
.progress-ring .pct{
  position:absolute;inset:0;display:grid;place-items:center;
  font-size:18px;font-weight:800;color:var(--burgundy);
}
.progress-card .name{
  font-size:11px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.1em;
  color:var(--burgundy);
  margin-bottom:4px;
}
.progress-card .desc{font-size:11px;color:var(--muted);font-weight:500;line-height:1.4}

/* TOC */
.toc-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:14px;
  margin:24px 0;
}
.toc-card{
  background:#fff;
  border:1px solid var(--border);
  border-left:4px solid var(--burgundy);
  padding:20px 22px;
  cursor:pointer;
  transition:.2s;
  text-align:left;
  font-family:inherit;
  display:block;
  width:100%;
}
.toc-card:hover{
  background:#fdfcf9;
  transform:translateY(-2px);
  box-shadow:0 4px 16px rgba(94,25,55,.06);
}
.toc-card .num{
  font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.15em;
  color:var(--burgundy);margin-bottom:6px;
}
.toc-card .title{
  font-size:15px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.02em;
  color:var(--ink);margin-bottom:6px;
  line-height:1.3;
}
.toc-card .desc{font-size:12px;color:var(--muted);font-weight:500;line-height:1.5}

/* EXAM-READY BLOC */
.exam-ready{
  background:var(--burgundy);
  color:#fff;
  padding:32px 36px;
  margin:32px 0;
  position:relative;
}
.exam-ready::before{
  content:'';position:absolute;top:0;right:0;
  width:60px;height:30px;background:var(--yellow);
}
.exam-ready .label{
  font-size:11px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.18em;
  color:var(--yellow);margin-bottom:8px;
}
.exam-ready h3{
  font-size:24px;font-weight:800;
  text-transform:uppercase;letter-spacing:-0.01em;
  margin-bottom:16px;color:#fff;
  border:none;padding:0;
}
.exam-ready ul{padding-left:20px}
.exam-ready ul li{margin:8px 0}
.exam-ready ul li::marker{color:var(--yellow)}
.exam-ready strong{color:var(--yellow)}

/* FLASHCARDS */
.fc-container{max-width:640px;margin:32px auto}
.flashcard{
  perspective:1500px;
  height:320px;
  cursor:pointer;
  margin-bottom:20px;
}
.fc-inner{
  position:relative;width:100%;height:100%;
  transform-style:preserve-3d;
  transition:transform .7s cubic-bezier(0.4,0,0.2,1);
}
.flashcard.flipped .fc-inner{transform:rotateY(180deg)}
.fc-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  padding:36px 40px;
  display:flex;flex-direction:column;justify-content:center;
}
.fc-front{
  background:var(--burgundy);
  color:#fff;
}
.fc-front::before{
  content:'';position:absolute;top:0;right:0;
  width:60px;height:30px;background:var(--yellow);
}
.fc-front .kicker{
  font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.18em;
  color:var(--yellow);margin-bottom:12px;
}
.fc-front .question{
  font-size:22px;font-weight:700;line-height:1.3;
}
.fc-front .hint{
  position:absolute;bottom:24px;left:40px;
  font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.15em;
  opacity:.6;
}
.fc-back{
  background:#fff;
  border:2px solid var(--burgundy);
  transform:rotateY(180deg);
  overflow-y:auto;
}
.fc-back .kicker{
  font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.18em;
  color:var(--burgundy);margin-bottom:12px;
}
.fc-back .answer{font-size:15px;line-height:1.6;color:var(--ink)}
.fc-back .answer strong{color:var(--burgundy)}

.fc-controls{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;margin-top:8px;
}
.fc-counter{
  font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.12em;
  color:var(--muted);
}
.fc-counter strong{color:var(--burgundy)}

/* BUTTONS */
.btn{
  background:var(--burgundy);
  color:#fff;
  border:none;
  padding:13px 26px;
  font-family:inherit;
  font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.12em;
  cursor:pointer;
  transition:.15s;
}
.btn:hover{background:var(--burgundy-dark)}
.btn.ghost{
  background:transparent;
  color:var(--burgundy);
  border:1px solid var(--burgundy);
}
.btn.ghost:hover{background:var(--burgundy);color:#fff}
.btn.sm{padding:9px 18px;font-size:10px}

/* QUIZ */
.quiz-q{
  background:#fff;
  border:1px solid var(--border);
  padding:22px 26px;
  margin:18px 0;
}
.quiz-q .qmeta{
  font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.15em;
  color:var(--muted);margin-bottom:8px;
}
.quiz-q .qtxt{font-size:16px;font-weight:600;margin-bottom:16px;line-height:1.4}
.quiz-opt{
  display:block;width:100%;text-align:left;
  background:#fff;
  border:1px solid var(--border);
  padding:12px 16px;
  margin:8px 0;
  font-family:inherit;font-size:14px;
  cursor:pointer;
  transition:.15s;
  font-weight:500;
  color:var(--ink);
}
.quiz-opt:hover{border-color:var(--burgundy);background:#fdfcf9}
.quiz-opt.selected{border-color:var(--burgundy);background:#fdf6f0}
.quiz-opt.correct{border-color:var(--green);background:#f0fbf6;font-weight:700}
.quiz-opt.correct::after{content:' ✓';color:var(--green);font-weight:800}
.quiz-opt.incorrect{border-color:var(--red);background:#fef0ee}
.quiz-opt.incorrect::after{content:' ✗';color:var(--red);font-weight:800}
.quiz-opt.disabled{cursor:default}
.quiz-explain{
  margin-top:12px;
  padding:12px 16px;
  background:var(--cream);
  border-left:3px solid var(--burgundy);
  font-size:13px;line-height:1.55;
  display:none;
}
.quiz-explain.show{display:block}
.quiz-explain strong{color:var(--burgundy)}
.quiz-score{
  position:sticky;bottom:20px;
  background:var(--burgundy);
  color:#fff;
  padding:16px 24px;
  display:flex;justify-content:space-between;align-items:center;
  margin-top:24px;
  box-shadow:0 -4px 16px rgba(0,0,0,.12);
}
.quiz-score .score-label{
  font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.15em;
  color:var(--yellow);
}
.quiz-score .score-value{
  font-size:22px;font-weight:800;
  font-family:'JetBrains Mono',monospace;
}

/* GLOSSARY */
.gloss-search{
  width:100%;
  background:#fff;
  border:1px solid var(--border);
  padding:13px 16px;
  font-family:inherit;font-size:14px;
  margin-bottom:20px;
  font-weight:500;
}
.gloss-search:focus{outline:none;border-color:var(--burgundy)}
.gloss-item{
  background:#fff;
  border:1px solid var(--border);
  border-left:3px solid var(--burgundy);
  padding:16px 22px;
  margin:8px 0;
}
.gloss-item .term{
  font-size:13px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.08em;
  color:var(--burgundy);
  margin-bottom:6px;
}
.gloss-item .def{font-size:14px;color:var(--ink);line-height:1.55}

/* SEARCH RESULTS */
.search-hit-card{
  background:#fff;border:1px solid var(--border);
  border-left:3px solid var(--burgundy);
  padding:18px 22px;margin:10px 0;
}
.search-hit-card .ctx{
  font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.15em;
  color:var(--burgundy);margin-bottom:8px;
}
.search-hit-card .snip{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:10px}
.search-hit{background:var(--yellow);padding:0 2px;font-weight:700;color:var(--ink)}

/* FOOTER */
footer{
  text-align:center;
  padding:32px;
  color:var(--muted);
  font-size:10px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.15em;
  border-top:1px solid var(--border);
  margin-top:48px;
}
footer .unleash{
  display:block;
  font-size:14px;font-weight:800;
  color:var(--burgundy);
  margin-bottom:8px;
  letter-spacing:0.05em;
}

/* RESPONSIVE */
@media(max-width:768px){
  header.app-header{padding:14px 18px;flex-wrap:wrap;gap:12px}
  .search-wrap{order:3;flex:1 0 100%}
  nav.app-nav{padding:0 18px;top:130px}
  main{padding:24px 18px 60px}
  h2.session-title{font-size:32px}
  .hero{padding:32px 24px}
  .hero h1{font-size:40px}
}

/* PRINT */
@media print{
  header.app-header,nav.app-nav,.fc-controls,.btn,.quiz-score{display:none}
  .view{display:block!important;page-break-after:always}
  .card,.callout{break-inside:avoid}
  body{background:#fff}
}

/* DECISION TREES */
.tree-wrap{max-width:720px;margin:0 auto}
.dt-reset{float:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);background:none;border:1px solid var(--border);padding:6px 12px;cursor:pointer;font-family:inherit}
.dt-reset:hover{color:var(--burgundy);border-color:var(--burgundy)}
.dt-question{background:var(--burgundy);color:#fff;padding:28px 32px;margin:24px 0}
.dt-question h4{font-size:20px;font-weight:800;text-transform:uppercase;margin-bottom:4px;letter-spacing:0.02em}
.dt-question .dt-path{font-size:10px;font-weight:600;letter-spacing:0.15em;opacity:.7;text-transform:uppercase;margin-bottom:16px}
.dt-choices{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.dt-btn{background:#fff;color:var(--burgundy);border:none;padding:14px 22px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:0.08em;transition:.15s;text-align:left;line-height:1.3}
.dt-btn:hover{background:var(--yellow)}
.dt-result{background:#fff;border:3px solid var(--burgundy);padding:28px 32px;margin:24px 0;animation:fadeIn .3s ease}
.dt-result .res-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.18em;color:var(--green);margin-bottom:8px}
.dt-result .res-test{font-size:32px;font-weight:900;text-transform:uppercase;color:var(--burgundy);margin-bottom:12px;letter-spacing:-0.01em;line-height:1.1}
.dt-result .res-format{font-family:'JetBrains Mono',monospace;font-size:13px;background:var(--cream);padding:10px 14px;color:var(--burgundy-dark);margin:14px 0}
.dt-result .res-when{font-size:14px;color:var(--ink);line-height:1.6}
.dt-result .res-when strong{color:var(--burgundy)}

/* SPACED REPETITION */
.sr-filter{display:flex;gap:8px;margin-bottom:16px;justify-content:center}
.sr-filter button{background:none;border:1px solid var(--border);padding:9px 18px;font-family:inherit;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;cursor:pointer;color:var(--muted);transition:.15s}

<h3 class="section-title">4. Cronbach's alpha & opérationnalisation</h3>
<div class="card accent">
<p><strong>Concept ≠ Variable</strong>. L'opérationnalisation, c'est le pont entre l'idée abstraite et la mesure concrète.</p>
<p>Exemple : <em>Brand Trust</em> (Delgado-Ballester, 2004) → 2 items Likert.</p>
<p>Pour combiner plusieurs items, vérifier <strong>Cronbach's α ≥ 0.7</strong>.</p>
</div>

<h3 class="section-title">5. Biais courants</h3>
<table>
<tr><th>Biais</th><th>Description</th><th>Solution</th></tr>
<tr><td><strong>Social Desirability</strong></td><td>Réponses socialement acceptables</td><td>Anonymat, formulation neutre</td></tr>
<tr><td><strong>Acquiescence</strong></td><td>Tendance à approuver</td><td>Reverse-coded items</td></tr>
<tr><td><strong>Common Method</strong></td><td>Même méthode → corrélations gonflées</td><td>Méthodes différentes</td></tr>
<tr><td><strong>Straightlining</strong></td><td>Même réponse partout</td><td>Attention checks + reverse</td></tr>
</table>

<h3 class="section-title">6. Designs expérimentaux : les 3 piliers</h3>
<div class="card accent">
<p>Une bonne expérience repose sur :</p>
<ol>
<li><strong>Manipulation</strong> de la variable indépendante</li>
<li><strong>Random assignment</strong> aux conditions</li>
<li><strong>Contrôle</strong> des variables externes</li>
</ol>
<p style="margin-top:8px"><span class="hl">X (IV) ━[Causal]━&gt; Y (VD)</span></p>
</div>

<h3 class="section-title">7. Corrélation ≠ Causalité</h3>
<div class="callout warning">
<div class="callout-label">⚠️ Exemples célèbres</div>
<ul>
<li><strong>Chocolat & Nobel</strong> : confondante = richesse nationale</li>
<li><strong>Glaces & noyades</strong> : confondante = chaleur de l'été</li>
</ul>
</div>
<p><strong>Les 3 conditions pour la causalité</strong> :</p>
<ol>
<li><strong>Covariation</strong> : X et Y bougent ensemble</li>
<li><strong>Précédence temporelle</strong> : X précède Y</li>
<li><strong>Pas d'explications alternatives</strong> : variables externes contrôlées</li>
</ol>

<h3 class="section-title">8. Random Sampling vs Random Assignment</h3>
<div class="callout warning">
<div class="callout-label">⚠️ Souvent confondu à l'examen</div>
</div>
<table>
<tr><th></th><th>Random Sampling</th><th>Random Assignment</th></tr>
<tr><td><strong>Concerne</strong></td><td>Sélection des participants</td><td>Allocation aux conditions</td></tr>
<tr><td><strong>Garantit</strong></td><td>Représentativité</td><td>Comparabilité des groupes</td></tr>
<tr><td><strong>Protège</strong></td><td>Validité externe</td><td><strong>Validité interne</strong></td></tr>
</table>
<p>Pour la <strong>causalité</strong>, le random assignment est prioritaire.</p>

<h3 class="section-title">9. Between vs Within Subjects</h3>
<table>
<tr><th></th><th>Between-Subjects</th><th>Within-Subjects</th></tr>
<tr><td><strong>Principe</strong></td><td>Une seule condition par participant</td><td>Toutes les conditions par participant</td></tr>
<tr><td><strong>Avantage</strong></td><td>Pas de carryover, validité interne</td><td>Plus de puissance statistique</td></tr>
<tr><td><strong>Inconvénient</strong></td><td>Plus de participants requis</td><td>Order effects, fatigue</td></tr>
</table>
<p>Cas <strong>WWF</strong> (S4/S6) = between-subjects, 4 conditions × 30 participants = 120.</p>

<h3 class="section-title">10. Designs factoriels (2×2 et plus)</h3>
<div class="callout example">
<div class="callout-label">🎯 Exemple Garvey, Kim & Duhachek (2021, JM)</div>
<p><em>"Bad News? Send an AI. Good News? Send a Human."</em></p>
<ul>
<li><strong>IV1</strong> : Type d'agent (AI vs Humain)</li>
<li><strong>IV2</strong> : Valence (Bonne vs Mauvaise nouvelle)</li>
<li><strong>VD</strong> : Réaction du consommateur</li>
</ul>
<p><strong>Résultat : interaction !</strong> Pas d'effet principal du type d'agent, mais bad news → consommateurs préfèrent l'AI ; good news → préfèrent l'humain. <span class="hl">L'effet DÉPEND de la valence.</span></p>
</div>

<h3 class="section-title">11. Validité interne — 7 menaces</h3>
<table>
<tr><th>Menace</th><th>Description</th></tr>
<tr><td><strong>Selection</strong></td><td>Différences pré-existantes (sol : random assignment)</td></tr>
<tr><td><strong>History</strong></td><td>Événements externes pendant l'expé</td></tr>
<tr><td><strong>Maturation</strong></td><td>Changements naturels (fatigue, apprentissage)</td></tr>
<tr><td><strong>Testing</strong></td><td>Mesure antérieure influence les suivantes</td></tr>
<tr><td><strong>Instrumentation</strong></td><td>Changement dans les instruments de mesure</td></tr>
<tr><td><strong>Statistical Regression</strong></td><td>Scores extrêmes reviennent vers la moyenne</td></tr>
<tr><td><strong>Attrition (Mortality)</strong></td><td>Dropout différentiel entre conditions</td></tr>
</table>

<h3 class="section-title">12. Validité interne ⇄ externe : le trade-off</h3>
<div class="callout intuition">
<div class="callout-label">💡 Intuition</div>
<p><strong>Lab</strong> = contrôle élevé, réalisme faible (validité interne).<br><strong>Field</strong> = réalisme élevé, contrôle faible (validité externe).<br>Best practice : <strong>multi-études</strong> combinant les deux.</p>
</div>
<div class="card tip">
<div class="label">🎯 Goldstein, Cialdini & Griskevicius (2008, JCR)</div>
<p>Field experiment dans de vrais hôtels. IV manipulée = panneau dans la chambre. <em>"75% of guests in this room reuse their towels"</em> a augmenté la réutilisation de <span class="hl">+33%</span> vs message standard.</p>
</div>

<h3 class="section-title">13. p-value & significativité</h3>
<table>
<tr><td><strong>p &lt; 0.001</strong></td><td>Très forte (***)</td></tr>
<tr><td><strong>p &lt; 0.01</strong></td><td>Forte (**)</td></tr>
<tr><td><strong>p &lt; 0.05</strong></td><td><span class="hl">Suffisante (*) — seuil standard</span></td></tr>
<tr><td><strong>p &gt; 0.05</strong></td><td>Non significatif</td></tr>
</table>
<div class="callout warning">
<div class="callout-label">⚠️ Piège sémantique</div>
<p><em>"significant"</em> en stats ≠ <em>"important"</em> en langage courant. Un effet peut être significatif et trivialement petit.</p>
</div>

<h3 class="section-title">14. Moderation & Mediation</h3>
<div class="card">
<p>Une expé basique répond à <strong>"Does it work?"</strong>. Une bonne recherche pose plus :</p>
<ul>
<li><strong>HOW</strong> ça marche ? → <strong>Mediation</strong> (mécanisme psychologique)</li>
<li><strong>FOR WHOM</strong> ça marche ? → <strong>Moderation</strong> (boundary conditions)</li>
</ul>
</div>
<div class="callout example">
<div class="callout-label">🎯 Pour Matrix</div>
<ul>
<li><strong>Moderation</strong> : <em>"Notre campagne marche, MAIS uniquement pour [segment]"</em></li>
<li><strong>Mediation</strong> : <em>"Notre campagne marche PARCE QU'elle déclenche [processus]"</em></li>
</ul>
</div>

<h3 class="section-title">15. A/B Testing & cas Obama 2012</h3>
<div class="card">
<p><strong>500+ A/B tests</strong> sur le site de campagne. Total : 1 milliard $ levés (690M $ digital), +379% vs Romney. Conversion dons +49%, sign-ups +161%.</p>
<p><em>"Experiment early and often"</em> — décision data-driven.</p>
</div>

<div class="exam-ready">
<div class="label">⚡ Examen</div>
<h3>Points S2 à retenir</h3>
<ul>
<li><strong>Surveys</strong> mesurent les relations · <strong>Expériences</strong> établissent la causalité</li>
<li><strong>3 piliers expérience</strong> : manipulation IV + random assignment + contrôle</li>
<li><strong>3 conditions causalité</strong> : covariation + précédence + pas d'alternative</li>
<li><strong>Random assignment ≠ random sampling</strong> (interne vs externe)</li>
<li><strong>Cronbach α ≥ 0.7</strong>, p < 0.05 standard</li>
<li><strong>4 biais</strong> : Social Desirability, Acquiescence, Common Method, Straightlining</li>
<li><strong>7 menaces validité interne</strong> : Selection, History, Maturation, Testing, Instrumentation, Stat Regression, Attrition</li>
<li><strong>Mediation = HOW · Moderation = FOR WHOM</strong></li>
<li>Aaker (1997) : 5 dimensions de personnalité de marque</li>
<li>Goldstein (2008) hotel : +33% réutilisation serviettes via norme sociale</li>
<li>Garvey (2021) : interaction AI/Humain × Bad/Good news</li>
</ul>
</div>
`;

<table>
<tr><th>Type</th><th>Usage</th><th>Avantage/Limite</th></tr>
<tr><td><strong>Multiple Choice</strong></td><td>Genre, condition, donation keep/give</td><td>Simple, clair</td></tr>
<tr><td><strong>Matrix Table</strong></td><td>Items Likert groupés (culpabilité, responsabilité)</td><td>Fluidifie · Overuse = abandon sur mobile</td></tr>
<tr><td><strong>Slider</strong></td><td>Montant (0–10€ donation)</td><td>Ancre le participant (min/max visible). Mobile-friendly si activé.</td></tr>

<div class="card accent">

<div class="card">

Sur la question à conditionner → Question behavior → Display logic<br>

<em>Différence clé</em> : Skip Logic saute à une autre section/fin. Display Logic montre/cache une question sur la même page.

<h3 class="section-title">PARTIE 1 — Analyse qualitative</h3>

<h4 style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--burgundy);margin:16px 0 8px">Thematic vs Content Analysis</h4>
<table>
<tr><th>Approche</th><th>Description</th><th>Quand</th></tr>
<tr><td><strong>Thematic Analysis</strong> (Braun &amp; Clarke, 2006)</td><td>Identifier des patterns récurrents → thèmes</td><td>Exploration ouverte, inductif</td></tr>
<tr><td><strong>Content Analysis</strong> (Krippendorff, 2018)</td><td>Compter et catégoriser des éléments prédéfinis</td><td>Comparaisons quantifiées, déductif</td></tr>
</table>

<h4 style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--burgundy);margin:16px 0 8px">Processus de codage</h4>
<div class="card accent">
Transcription brute → <strong>Codes</strong> (étiquettes sur extraits) → <strong>Catégories</strong> (codes regroupés) → <strong>Thèmes</strong> → <strong>Insights / Théorie</strong>
</div>
<div class="callout intuition">
<div class="callout-label">💡 Intuition</div>
<p>Coder un texte = surligner un livre avec un marqueur différent par idée. Puis regrouper les surlignages similaires en thèmes. <strong>Déductif</strong> = partir de codes prédéfinis. <strong>Inductif</strong> = laisser émerger les codes du texte.</p>
</div>
<div class="card">
<strong>Taguette</strong> — outil gratuit collaboratif de codage quali. Workflow : Import → Tag → Review → Export. À installer avant S6 (via Blackboard).<br>
<strong>Inter-coder reliability</strong> : deux chercheurs codent indépendamment → accord élevé = analyse plus crédible.
</div>

<h3 class="section-title">PARTIE 2 — Préparation des données quantitatives</h3>

<h4 style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--burgundy);margin:16px 0 8px">Compound scores (scales multi-items)</h4>
<div class="card">
Exemple : "Guiltfeelings" = moyenne de 4 items Likert.<br>
<strong>SPSS</strong> : Transform → Compute Variable → <code>MEAN(item1, item2, item3, item4)</code>
</div>

<h4 style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--burgundy);margin:16px 0 8px">Cronbach's Alpha — fiabilité interne</h4>
<div class="callout intuition">
<div class="callout-label">💡 Intuition</div>
<p>α teste si tes items "rament dans le même sens". Si tu mesures la culpabilité avec 4 questions similaires, elles doivent être corrélées. α &lt; 0.7 = les items ne mesurent pas la même chose → ne pas créer le compound score.</p>
</div>
<table>
<tr><th>Valeur α</th><th>Interprétation</th></tr>
<tr><td>α ≥ 0.9</td><td>Excellent</td></tr>
<tr><td>α ≥ 0.8</td><td>Bon</td></tr>
<tr><td><strong>α ≥ 0.7</strong></td><td><strong>Acceptable ✅ (seuil standard)</strong></td></tr>
<tr><td>α ≥ 0.6</td><td>Questionnable</td></tr>
<tr><td>α &lt; 0.6</td><td>Médiocre → revoir les items</td></tr>
</table>
<p style="margin-top:8px;font-size:13px;color:var(--muted)">SPSS : Analyze → Scale → Reliability Analysis → Alpha</p>

<h3 class="section-title">PARTIE 3 — Analyse SPSS</h3>

<h4 style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--burgundy);margin:16px 0 8px">Choisir le bon test statistique ★ EXAMEN ★</h4>
<div class="card accent">
<table>
<tr><th>IV</th><th>DV</th><th>Test</th><th>SPSS</th></tr>
<tr><td>Nominale (2 groupes)</td><td>Métrique</td><td><strong>Independent t-test</strong></td><td>Compare Means → Ind.-Samples T Test</td></tr>
<tr><td>Nominale (3+ groupes)</td><td>Métrique</td><td><strong>One-Way ANOVA</strong> + Tukey</td><td>Compare Means → One-Way ANOVA</td></tr>
<tr><td>Métrique</td><td>Métrique</td><td><strong>Linear Regression</strong></td><td>Regression → Linear</td></tr>
<tr><td>Nominale</td><td>Nominale</td><td><strong>Chi-square</strong></td><td>Descriptive → Crosstabs → Chi-square</td></tr>
</table>
</div>

<h4 style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--burgundy);margin:16px 0 8px">p-valeur et H0/H1</h4>
<div class="card">
<strong>H0</strong> (null) : pas de différence / pas d'effet · <strong>H1</strong> : il y a un effet<br><br>
<table>
<tr><th>p-valeur</th><th>Décision</th></tr>
<tr><td><strong>p &lt; 0.05</strong></td><td>Rejeter H0 → effet <strong>significatif</strong> ✅</td></tr>
<tr><td>p ≥ 0.05</td><td>Conserver H0 → <strong>non significatif</strong></td></tr>
</table>
</div>

<h4 style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--burgundy);margin:16px 0 8px">One-Way ANOVA — étapes SPSS</h4>
<div class="card accent">
<strong>Step 1</strong> : Analyze → Compare Means → One-Way ANOVA<br>
<strong>Step 2</strong> : Dependent List = Guiltfeelings, Responsibility, Generosity · Factor = Visuals (condition)<br>
<strong>Step 3</strong> : Options → ✅ Descriptive + ✅ Homogeneity of variance (Levene)<br>
<strong>Step 4</strong> : Post Hoc → ✅ Tukey<br>
<strong>Step 5</strong> : OK
</div>

<h4 style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--burgundy);margin:16px 0 8px">Levene's Test (vérifier avant ANOVA)</h4>
<table>
<tr><th>Levene Sig.</th><th>Décision</th></tr>
<tr><td>p &gt; 0.05</td><td>Variances égales → ANOVA standard ✅</td></tr>
<tr><td>p &lt; 0.05</td><td>Variances inégales → utiliser <strong>Welch's ANOVA</strong></td></tr>
</table>

<h4 style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--burgundy);margin:16px 0 8px">Lire l'output ANOVA (tableau "Sig.")</h4>
<div class="card">
Colonnes clés : <strong>F</strong> (statistique) · <strong>df</strong> (degrés liberté) · <strong>Sig.</strong> (p-valeur = ta valeur clé)<br><br>
<strong>Résultats WWF (illustratifs)</strong> :
<table>
<tr><th>DV</th><th>F</th><th>df</th><th>p</th><th>Conclusion</th></tr>
<tr><td>Guiltfeelings</td><td>4.103</td><td>(3, 116)</td><td>.008</td><td>✅ Significatif</td></tr>
<tr><td>Responsibility</td><td>1.875</td><td>(3, 116)</td><td>.138</td><td>❌ Non significatif</td></tr>
<tr><td>Generosity</td><td>12.235</td><td>(3, 116)</td><td>&lt;.001</td><td>✅ Très significatif</td></tr>
</table>
</div>
<div class="callout warning">
<div class="callout-label">⚠️ Piège majeur</div>
<p>L'ANOVA dit "au moins un groupe diffère" mais PAS lequel. Pour savoir QUELS groupes → Post-hoc Tukey.</p>
</div>

<h4 style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--burgundy);margin:16px 0 8px">Post-hoc Tukey HSD</h4>
<div class="callout intuition">
<div class="callout-label">💡 Intuition</div>
<p>Tukey HSD (Honestly Significant Difference, 1949) : compare toutes les paires de groupes. Si Sig. &lt; 0.05 → ces deux groupes sont significativement différents (marqués * dans l'output).</p>
</div>
<div class="card">
<strong>Multiple Comparisons output — Generosity (WWF)</strong>
<table>
<tr><th>Comparaison</th><th>Mean Diff</th><th>Sig.</th><th>Résultat</th></tr>
<tr><td>Panda vs Rain Forest</td><td>-2.800</td><td>&lt;.001</td><td>✅ Significatif*</td></tr>
<tr><td>Panda vs Rhino</td><td>-2.000</td><td>.003</td><td>✅ Significatif*</td></tr>
<tr><td>Deer vs Rain Forest</td><td>-2.733</td><td>&lt;.001</td><td>✅ Significatif*</td></tr>
<tr><td>Rain Forest vs Rhino</td><td>0.800</td><td>.497</td><td>Non significatif</td></tr>
</table>
</div>
<div class="card accent" style="margin-top:12px">
<strong>Descriptives — Generosity</strong>
<table>
<tr><th>Campagne</th><th>N</th><th>M</th><th>SD</th></tr>
<tr><td>Panda</td><td>30</td><td>1.93</td><td>1.31</td></tr>
<tr><td>Deer</td><td>30</td><td>2.00</td><td>1.44</td></tr>
<tr><td>Rain Forest</td><td>30</td><td><strong>4.73</strong></td><td>2.82</td></tr>
<tr><td>Rhino</td><td>30</td><td>3.93</td><td>2.77</td></tr>
</table>
→ <strong>Rain Forest et Rhino génèrent significativement plus de générosité que Panda et Deer.</strong>
</div>

<h4 style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--burgundy);margin:16px 0 8px">Régression linéaire (METRIC IV → METRIC DV)</h4>
<div class="card">
<strong>Exemple</strong> : Âge (IV métrique) → Don (DV métrique)<br>
SPSS : Analyze → Regression → Linear → Dependent: Donation · Independent: Age<br><br>
<strong>Lire l'output :</strong><br>
• <strong>R²</strong> = % de variance de la DV expliqué par l'IV (en sciences sociales : 0.02–0.15 = normal)<br>
• Coefficients table : <strong>B</strong> (changement DV pour +1 unité IV) · <strong>Sig.</strong> (est-ce significatif ?)<br><br>
<strong>Résultat WWF</strong> : B = 0.013, p = .695 → <strong>l'âge ne prédit pas significativement les dons</strong>
</div>

<h4 style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--burgundy);margin:16px 0 8px">Rédiger les résultats — templates APA ★ EXAMEN ★</h4>
<div class="card accent">
<strong>ANOVA :</strong><br>
<em>"A one-way ANOVA revealed a significant effect of campaign type on guilt feelings, F(3, 116) = 4.103, p = .008."</em><br><br>
<strong>Post-hoc :</strong><br>
<em>"Tukey post-hoc tests showed that Campaigns 3 and 4 (M = 4.73; M = 3.93) produced significantly higher generosity than Campaigns 1 and 2 (M = 2.0; M = 1.93), p &lt; .01."</em><br><br>
<strong>Régression :</strong><br>
<em>"A linear regression showed that age was not a significant predictor of donation amount (β = 0.013, t(118) = 0.393, p = .695)."</em><br><br>
<strong>Golden rules</strong> : toujours mentionner le test · inclure F/t/β + p-value · reporter M et SD pour effets significatifs · utiliser tableaux.
</div>

<h3 class="section-title">✅ Test toi sur S6</h3>
<div class="card">
<p><strong>Q1</strong> — IV nominale 4 groupes, DV métrique. Quel test ?</p>
<details><summary>Voir réponse</summary><strong>One-way ANOVA</strong> + post-hoc <strong>Tukey HSD</strong> pour identifier quels groupes diffèrent.</details>
<p style="margin-top:10px"><strong>Q2</strong> — Levene donne p = .02. Que faire ?</p>
<details><summary>Voir réponse</summary>p &lt; 0.05 → variances inégales → utiliser <strong>Welch's ANOVA</strong> au lieu de l'ANOVA standard.</details>
<p style="margin-top:10px"><strong>Q3</strong> — B = 0.013, p = .695. Comment interpréter ?</p>
<details><summary>Voir réponse</summary>p &gt; 0.05 → non significatif. L'âge <strong>ne prédit pas</strong> les dons. B = 0.013 = +0.013€ par an d'âge mais cet effet est dû au hasard.</details>
<p style="margin-top:10px"><strong>Q4</strong> — Quelle phrase pour un résultat ANOVA non significatif ?</p>
<details><summary>Voir réponse</summary><em>"A one-way ANOVA revealed no significant effect of [IV] on [DV], F(3, 116) = 1.875, p = .138."</em></details>
</div>
`;

// ============ GLOSSARY ============
const GLOSSARY = [
  {term:"A/B Testing",def:"Expérience où 2+ versions d'une variable sont présentées à des groupes comparables. Cas Obama 2012 : 500+ tests, +49% conversions de dons."},
  {term:"Acquiescence Bias",def:"Tendance à approuver les affirmations indépendamment du contenu. Solution : reverse-coded items."},
  {term:"ANOVA (One-way)",def:"Compare les moyennes entre 3+ groupes. IV nominal, DV métrique. Output clé : F, df, p-value."},
  {term:"Attrition (Mortality)",def:"Dropout systématique de participants pendant l'expérience, surtout s'il diffère selon les conditions. Menace majeure à la validité interne."},
  {term:"Between-subjects design",def:"Chaque participant n'est exposé qu'à UNE seule condition. Pas de carryover. Cas WWF = between-subjects."},
  {term:"Cronbach's Alpha (α)",def:"Mesure de consistance interne d'une échelle multi-items. Seuils : ≥0.9 excellent, ≥0.8 bon, ≥0.7 acceptable (standard)."},
  {term:"Data Saturation",def:"Point où la collecte qualitative ne produit plus que de la redondance. Critère principal d'arrêt (Moser & Korstjens, 2018)."},
  {term:"Double-barreled Question",def:"Question piège qui en contient deux : 'Cette marque est innovante ET fiable ?'. À éviter."},
  {term:"External Validity",def:"Capacité des findings à se généraliser à d'autres populations, contextes, époques, opérationnalisations. Protégée par random sampling et réplications."},
  {term:"Factorial Design (2×2)",def:"Test simultané de 2+ IV. Permet d'identifier main effects + interactions. Ex : Garvey et al. 2021 (AI vs Humain × Bad/Good news)."},
  {term:"Field Experiment",def:"Expérience menée dans un environnement naturel (ex : Goldstein 2008 dans de vrais hôtels). Validité externe haute, contrôle moindre."},
  {term:"Focus Group",def:"Interview de 6-10 personnes simultanément, menée par un modérateur. Durée 60-120 min. Sarstedt & Mooi (2019)."},
  {term:"Internal Validity",def:"Capacité à conclure que la manipulation IV cause l'effet observé sur la VD. Protégée par random assignment, settings contrôlés, manipulation checks."},
  {term:"Interaction Effect",def:"L'effet d'une IV dépend du niveau d'une autre IV. Souvent les findings les plus intéressants. Ex : effet du type d'agent dépend de la valence (Garvey 2021)."},
  {term:"Leading Question",def:"Question orientant la réponse : 'Vous êtes d'accord que…?'. À éviter."},
  {term:"Levene's Test",def:"Test de l'homogénéité des variances (assumption ANOVA). p > 0.05 = OK. p < 0.05 = utiliser Welch's ANOVA."},
  {term:"Likert Scale",def:"Échelle d'accord avec une affirmation (1-5 ou 1-7). La plus courante en marketing research."},
  {term:"Manipulation Check",def:"Question vérifiant que la manipulation a été perçue. Toujours placée APRÈS la VD pour éviter le priming."},
  {term:"Mediation",def:"Mécanisme psychologique entre IV et DV. Répond à la question HOW does it work?"},
  {term:"Moderation",def:"Boundary conditions : pour qui ou dans quel contexte l'effet est plus fort/faible. Répond à FOR WHOM does it work?"},
  {term:"Operationalization",def:"Passage du concept abstrait (Brand Trust) à la variable mesurable (2 items Likert). Définition conceptuelle → définition opérationnelle."},
  {term:"P-value",def:"Probabilité d'observer ce résultat (ou plus extrême) si H₀ est vraie. Seuil standard : p < 0.05."},
  {term:"Pilot Test",def:"Test préliminaire d'un survey/expérience avant le lancement officiel. Vérifie clarté, timing, manipulation check."},
  {term:"Post-hoc Test",def:"Test après ANOVA significatif pour identifier QUELS groupes diffèrent. Tukey HSD = le plus courant et conservateur."},
  {term:"Purposive Sampling",def:"Sélection de participants selon un critère a priori (informateurs riches en information)."},
  {term:"Qualtrics",def:"Plateforme de design de surveys et expériences. Outil principal du cours pour la collecte quantitative."},
  {term:"Random Assignment",def:"Affecter les participants aux conditions au hasard. Protège la VALIDITÉ INTERNE. Probabiliste, pas déterministe."},
  {term:"Random Sampling",def:"Tirage aléatoire de participants depuis la population. Protège la VALIDITÉ EXTERNE (généralisation)."},
  {term:"Reverse-coded Item",def:"Item formulé à l'opposé du construct. Détecte straightlining et acquiescence."},
  {term:"Sample Saturation",def:"Voir 'Data Saturation'."},
  {term:"Semi-structured Interview",def:"Guide avec questions clés mais flexibilité dans formulation et follow-ups. Format standard pour Matrix."},
  {term:"Snowball Sampling",def:"Recrutement par référencement entre participants. Utile pour populations difficiles d'accès."},
  {term:"Social Desirability Bias",def:"Répondre de manière socialement acceptable. Solution : anonymat, formulation neutre."},
  {term:"SPSS",def:"Logiciel statistique IBM. Outil principal du cours pour ANOVA, régression."},
  {term:"Straightlining",def:"Sélectionner la même réponse partout. Détection : attention checks + reverse-coded."},
  {term:"Survey",def:"Méthode quantitative de collecte par questionnaire. Mesure des relations entre variables. Ne peut PAS établir la causalité."},
  {term:"Synthetic Data",def:"Données générées par IA (LLMs) pour remplacer des participants. Limites actuelles : hallucinations, ne simulent pas la psychologie humaine (Schröder et al. 2025)."},
  {term:"Taguette",def:"Outil gratuit collaboratif de codage qualitatif (app.taguette.org). Workflow : Import → Tag → Review → Export."},
  {term:"Thematic Analysis",def:"Approche qualitative en 6 phases (Braun & Clarke 2006) : familiarisation → codes initiaux → recherche thèmes → révision → définition → rédaction."},
  {term:"Tukey HSD",def:"Honestly Significant Difference (Tukey 1949). Test post-hoc le plus courant et conservateur. Contrôle le family-wise error rate."},
  {term:"Within-subjects design",def:"Chaque participant voit toutes les conditions. Plus puissant statistiquement mais risque de biais d'ordre."}
];

  {q:"Différence entre Display Logic et Skip Logic dans Qualtrics ?",a:"<strong>Skip Logic</strong> : saute à une autre section ou End Survey (ex : consentement → End if 'No').<br><strong>Display Logic</strong> : affiche / masque une question conditionnellement (ex : Q11 slider si Q10 = 'donate')."},
  {q:"Quels sont les 4 types de questions Qualtrics vus en cours ?",a:"1. <strong>Multiple Choice</strong> (genre, condition)<br>2. <strong>Matrix Table</strong> (Likert multi-items)<br>3. <strong>Slider</strong> (numérique avec plage 0–10)<br>4. <strong>Text Entry + validation Number</strong> (âge précis)"},
  {q:"Pourquoi exporter en 'Use numeric values' et que signifie -99 ?",a:"SPSS a besoin de <strong>chiffres</strong>, pas de texte. <strong>-99</strong> = question vue par le participant mais non répondue (distinct de 'jamais affichée' = missing data)."},

  {q:"Quelle est la différence entre thematic analysis et content analysis ?",a:"<strong>Thematic Analysis</strong> (Braun & Clarke 2006) : thèmes émergents, inductif/déductif, qualitatif.<br><strong>Content Analysis</strong> (Krippendorff 2018) : compter et catégoriser de façon systématique, plus quantifiable."},

function computeReadiness(){
  const saved = lsGet(LS_QUIZ);
  const total = Object.keys(saved).length;
  const correct = Object.entries(saved).filter(([k,v])=>QUIZ[+k]&&QUIZ[+k].correct===v).length;
  const pct = total>0 ? Math.round(correct/total*100) : 0;
  const el = document.getElementById('readiness-pct');
  const sub = document.getElementById('readiness-sub');
  if(el) el.textContent = pct+'%';
  if(sub) sub.textContent = total+' / '+QUIZ.length+' QCM RÉPONDUS';
  // Update rings on home
  if(document.getElementById('progress-ring-s1')){
    const sess = {s1:[0,6],s2:[6,20],s3:[20,23]};
    Object.entries(sess).forEach(([id,[from,to]])=>{
      let s=0,c=0;
      for(let i=from;i<to;i++){if(saved[i]!==undefined){s++;if(QUIZ[i].correct===saved[i])c++;}}
      const p=s>0?Math.round(c/s*100):0;
      const ring=document.getElementById('progress-ring-'+id);
      const pctEl=document.getElementById('progress-pct-'+id);
      if(ring&&pctEl){
        const r=32,circ=2*Math.PI*r;
        ring.style.strokeDashoffset=circ*(1-p/100);
        pctEl.textContent=p+'%';
      }
    });
  }
  return {pct,total,correct};
}

// ============ CONFETTI ============
function confetti(){
  const colors=['#5E1937','#F7C642','#00B894','#fff','#3F0F23','#7A2447'];
  for(let i=0;i<80;i++){
    const p=document.createElement('div');
    p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;background:${colors[i%colors.length]};animation-delay:${Math.random()*1.5}s;animation-duration:${2+Math.random()*1.5}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),4000);
  }
}

// ============ APP NAV ============
function buildNav(){
  document.getElementById('nav').innerHTML = SESSIONS.map(s=>{
    const badge = s.badge ? `<span class="badge">${s.badge}</span>` : '';
    return `<button data-id="${s.id}" onclick="go('${s.id}')">${s.label}${badge}</button>`;
  }).join('');
}

function go(id){
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
  document.getElementById('main').innerHTML = `<div class="view active">${VIEWS[id]||'<p>Section introuvable</p>'}</div>`;
  if(id==='glossary')renderGlossary('');
  if(id==='flashcards')initFlashcards();
  if(id==='quiz')renderQuiz();
  if(id==='drill')initDrill();
  if(id==='trees'){}
  if(id==='home')setTimeout(computeReadiness,50);
  window.scrollTo({top:0,behavior:'smooth'});
}

// ============ GLOSSARY ============
function renderGlossary(filter){
  const list = document.getElementById('gloss-list');
  if(!list)return;
  const f = (filter||'').toLowerCase().trim();
  const items = GLOSSARY.filter(g=>!f||g.term.toLowerCase().includes(f)||g.def.toLowerCase().includes(f));
  list.innerHTML = items.length
    ? items.sort((a,b)=>a.term.localeCompare(b.term)).map(g=>`<div class="gloss-item"><div class="term">${g.term}</div><div class="def">${g.def}</div></div>`).join('')
    : '<p class="lede">Aucun résultat.</p>';
}

// ============ FLASHCARDS + SPACED REPETITION ============
let fcIdx=0, fcOrder=[...Array(FLASHCARDS.length).keys()], fcMode='all';
function initFlashcards(){
  fcIdx=0;
  fcMode='all';
  rebuildFCOrder();
  renderCard();
  updateSRStats();
}
function rebuildFCOrder(){
  const sr=lsGet(LS_SR);
  if(fcMode==='all') fcOrder=[...Array(FLASHCARDS.length).keys()];
  else if(fcMode==='review') fcOrder=Object.keys(sr).filter(k=>sr[k]==='review').map(Number);
  else if(fcMode==='unseen') fcOrder=[...Array(FLASHCARDS.length).keys()].filter(i=>!sr[i]);
  if(!fcOrder.length) fcOrder=[...Array(FLASHCARDS.length).keys()];
  fcIdx=0;
}
function renderCard(){
  const realIdx=fcOrder[fcIdx%fcOrder.length];
  const card=FLASHCARDS[realIdx];
  const el=document.getElementById('fc'); if(!el)return;
  const sr=lsGet(LS_SR);
  el.classList.remove('flipped','fc-known','fc-to-review');
  if(sr[realIdx]==='know') el.classList.add('fc-known');
  if(sr[realIdx]==='review') el.classList.add('fc-to-review');
  const kicker=document.getElementById('fc-kicker');
  if(kicker){
    if(sr[realIdx]==='know') kicker.textContent='✓ SUE';
    else if(sr[realIdx]==='review') kicker.textContent='✗ À REVOIR';
    else kicker.textContent='QUESTION';
  }
  document.getElementById('fc-q').innerHTML=card.q;
  document.getElementById('fc-a').innerHTML=card.a;
  document.getElementById('fc-i').textContent=fcIdx+1;
  const tot=document.getElementById('fc-total');
  if(tot)tot.textContent=fcOrder.length;
}
function updateSRStats(){
  const sr=lsGet(LS_SR);
  const known=Object.values(sr).filter(v=>v==='know').length;
  const review=Object.values(sr).filter(v=>v==='review').length;
  const unseen=FLASHCARDS.length-Object.keys(sr).length;
  const k=document.getElementById('sr-known'),r=document.getElementById('sr-review'),u=document.getElementById('sr-unseen');
  if(k)k.textContent=known;
  if(r)r.textContent=review;
  if(u)u.textContent=Math.max(0,unseen);
}
function setSRMode(mode,btn){
  fcMode=mode;
  document.querySelectorAll('.sr-filter button').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  rebuildFCOrder();
  renderCard();
  updateSRStats();
}
function flipCard(){document.getElementById('fc').classList.toggle('flipped')}
function rateCard(rating,e){
  if(e)e.stopPropagation();
  const realIdx=fcOrder[fcIdx%fcOrder.length];
  const sr=lsGet(LS_SR);
  sr[realIdx]=rating;
  lsSet(LS_SR,sr);
  updateSRStats();
  computeReadiness();
  // Advance
  fcIdx=(fcIdx+1)%fcOrder.length;
  if(fcMode!=='all'){rebuildFCOrder();}
  renderCard();
}
function nextCard(e){if(e)e.stopPropagation();fcIdx=(fcIdx+1)%fcOrder.length;renderCard()}
function prevCard(e){if(e)e.stopPropagation();fcIdx=(fcIdx-1+fcOrder.length)%fcOrder.length;renderCard()}
function shuffleCards(){fcOrder.sort(()=>Math.random()-.5);fcIdx=0;renderCard()}

// ============ QUIZ ============
let answered={};
function renderQuiz(){
  const saved=lsGet(LS_QUIZ);
  answered={...Object.fromEntries(Object.entries(saved).map(([k,v])=>[+k,v]))};
  document.getElementById('quiz-list').innerHTML = QUIZ.map((q,i)=>`
    <div class="quiz-q" id="q${i}">
      <div class="qmeta">QUESTION ${i+1} / ${QUIZ.length}</div>
      <div class="qtxt">${q.q}</div>
      ${q.opts.map((o,j)=>`<button class="quiz-opt${answered[i]!==undefined?(' disabled'+(j===q.correct?' correct':(j===answered[i]?' incorrect':''))):''}" onclick="answer(${i},${j})">${String.fromCharCode(65+j)}. ${o}</button>`).join('')}
      <div class="quiz-explain${answered[i]!==undefined?' show':''}" id="exp${i}"><strong>Explication :</strong> ${q.exp}</div>
    </div>`).join('');
  updateScore();
}
function answer(qi,oi){
  if(answered[qi]!==undefined)return;
  answered[qi]=oi;
  const correct=QUIZ[qi].correct;
  document.querySelectorAll(`#q${qi} .quiz-opt`).forEach((el,idx)=>{
    el.classList.add('disabled');
    if(idx===correct)el.classList.add('correct');
    else if(idx===oi)el.classList.add('incorrect');
  });
  document.getElementById('exp'+qi).classList.add('show');
  // Persist
  const saved=lsGet(LS_QUIZ); saved[qi]=oi; lsSet(LS_QUIZ,saved);
  updateScore();
  computeReadiness();
}
function updateScore(){
  const total=Object.keys(answered).length;
  const correct=Object.entries(answered).filter(([k,v])=>QUIZ[+k]&&QUIZ[+k].correct===+v).length;
  const el=document.getElementById('score-text');
  if(el)el.textContent=`${correct} / ${total}${total>0?` (${Math.round(correct/total*100)}%)`:''}`;
  if(total===QUIZ.length&&correct===QUIZ.length)confetti();
}
function resetQuiz(){lsSet(LS_QUIZ,{});renderQuiz();window.scrollTo({top:0,behavior:'smooth'})}

// ============ DECISION TREES ============
let activeTree=null, treeHistory=[];
function startTree(treeId){
  activeTree=TREES[treeId];
  treeHistory=[];
  renderTreeNode(activeTree.start);
}
function renderTreeNode(nodeId){
  const out=document.getElementById('tree-output'); if(!out)return;
  const node=activeTree.nodes[nodeId];
  if(!node){out.innerHTML='<p>Nœud introuvable.</p>';return;}
  if(node.type==='q'){
    out.innerHTML=`
      <div class="tree-wrap">
        <button class="dt-reset" onclick="resetTree()">↩ RECOMMENCER</button>
        <div class="dt-question">
          ${node.path?`<div class="dt-path">${node.path}</div>`:''}
          <h4>${node.text}</h4>
          <div class="dt-choices">
            ${node.choices.map((c,i)=>`<button class="dt-btn" onclick="treeChoose('${c.next}','${nodeId}')">${c.label.replace(/\n/g,'<br>')}</button>`).join('')}
          </div>
        </div>
      </div>`;
  } else {
    out.innerHTML=`
      <div class="tree-wrap">
        <button class="dt-reset" onclick="resetTree()">↩ RECOMMENCER</button>
        <div class="dt-result">
          <div class="res-label">✓ Ton test / ta méthode</div>
          <div class="res-test">${node.test}</div>
          <div class="res-format">${node.format}</div>
          <div class="res-when">${node.when}</div>
          ${node.pkg?`<div style="margin-top:14px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted)">Dans SPSS / cours : <span style="color:var(--burgundy)">${node.pkg}</span></div>`:''}
        </div>
      </div>`;
  }
}
function treeChoose(nextId,fromId){
  treeHistory.push(fromId);
  renderTreeNode(nextId);
}
function resetTree(){
  treeHistory=[];
  document.getElementById('tree-output').innerHTML='';
}

// ============ QUICK DRILL ============
let drillQ=[], drillIdx=0, drillAnswered={}, drillCount=5;
function initDrill(){ drillQ=[];drillIdx=0;drillAnswered={} }
function startDrill(n){
  drillCount=n||5;
  const pool=[...QUIZ.keys()].sort(()=>Math.random()-.5).slice(0,drillCount);
  drillQ=pool;
  drillIdx=0;
  drillAnswered={};
  renderDrillQ();
}
function renderDrillQ(){
  const root=document.getElementById('drill-root'); if(!root)return;
  if(drillIdx>=drillQ.length){renderDrillEnd();return;}
  const qi=drillQ[drillIdx];
  const q=QUIZ[qi];
  const pct=Math.round(drillIdx/drillQ.length*100);
  root.innerHTML=`
    <div class="drill-hero">
      <div class="kicker">QUESTION ${drillIdx+1} / ${drillQ.length}</div>
      <h3>Quick Drill</h3>
    </div>
    <div class="drill-progress"><div class="drill-bar" style="width:${pct}%"></div></div>
    <div class="drill-q-wrap">
      <div class="drill-q-num">Question ${drillIdx+1}</div>
      <div class="drill-q-txt">${q.q}</div>
      ${q.opts.map((o,j)=>`<button class="quiz-opt" id="dopt${j}" onclick="drillAnswer(${qi},${j})">${String.fromCharCode(65+j)}. ${o}</button>`).join('')}
      <div class="quiz-explain" id="drill-exp"><strong>Explication :</strong> ${q.exp}</div>
    </div>
    <div id="drill-next" style="display:none;text-align:center;margin-top:16px">
      <button class="btn" onclick="drillNext()">SUIVANT →</button>
    </div>`;
}
function drillAnswer(qi,oi){
  if(drillAnswered[drillIdx]!==undefined)return;
  drillAnswered[drillIdx]=oi;
  const q=QUIZ[qi];
  document.querySelectorAll('.drill-q-wrap .quiz-opt').forEach((el,idx)=>{
    el.classList.add('disabled');
    if(idx===q.correct)el.classList.add('correct');
    else if(idx===oi)el.classList.add('incorrect');
  });
  document.getElementById('drill-exp').classList.add('show');
  document.getElementById('drill-next').style.display='block';
}
function drillNext(){drillIdx++;renderDrillQ()}
function renderDrillEnd(){
  const root=document.getElementById('drill-root');if(!root)return;
  const correct=Object.values(drillAnswered).filter((v,i)=>QUIZ[drillQ[i]]&&QUIZ[drillQ[i]].correct===v).length;
  const pct=Math.round(correct/drillQ.length*100);
  const msg=pct===100?'Parfait ! 🏆':pct>=80?'Excellent !':pct>=60?'Bien, continue !':'Révise encore !';
  root.innerHTML=`
    <div class="drill-end">
      <span class="drill-score-big">${correct}/${drillQ.length}</span>
      <div class="drill-score-label">${pct}% de réussite</div>
      <div class="drill-msg">${msg}</div>
      <button class="btn" onclick="startDrill(${drillQ.length})" style="margin-right:10px">RECOMMENCER</button>
      <button class="btn ghost" onclick="startDrill(5)">NOUVEAU DRILL</button>
    </div>`;
  if(pct===100)confetti();
}

// ============ SEARCH ============
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase().trim();
  if(!q){go('home');return}
  let html=`<h2 class="session-title">Résultats : "${e.target.value}"</h2><div class="session-meta">RECHERCHE FULL-TEXT</div>`;
  const matches=[];
  Object.entries(VIEWS).forEach(([id,htmlContent])=>{
    if(['home','glossary','flashcards','quiz','trees','drill'].includes(id))return;
    const text=htmlContent.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ');
    const idx=text.toLowerCase().indexOf(q);
    if(idx>=0){
      const start=Math.max(0,idx-80),end=Math.min(text.length,idx+200);
      const snippet=text.slice(start,end).replace(new RegExp(q,'gi'),m=>`<span class="search-hit">${m}</span>`);
      const session=SESSIONS.find(s=>s.id===id);
      matches.push(`<div class="search-hit-card"><div class="ctx">${session.label}</div><div class="snip">…${snippet}…</div><button class="btn sm" onclick="document.getElementById('search').value='';go('${id}')">OUVRIR →</button></div>`);
    }
  });
  GLOSSARY.forEach(g=>{
    if(g.term.toLowerCase().includes(q)||g.def.toLowerCase().includes(q)){
      matches.push(`<div class="search-hit-card"><div class="ctx">GLOSSAIRE · ${g.term}</div><div class="snip">${g.def.replace(new RegExp(q,'gi'),m=>`<span class="search-hit">${m}</span>`)}</div></div>`);
    }
  });
  html+=matches.length?matches.join(''):'<p class="lede">Aucun résultat trouvé.</p>';
  document.getElementById('main').innerHTML=`<div class="view active">${html}</div>`;
});

// ============ INIT ============
buildNav();
go('home');
computeReadiness();
</script>
