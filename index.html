<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Marketing Research Methods · EDHEC · Fiches de révision</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --burgundy:#5E1937;
  --burgundy-dark:#3F0F23;
  --burgundy-light:#7A2447;
  --yellow:#F7C642;
  --green:#00B894;
  --red:#C0392B;
  --bg:#FAFAF7;
  --cream:#EFEAE0;
  --ink:#1A1A1A;
  --muted:#6B6B6B;
  --border:#E8E2D8;
  --border-strong:#D4CCBE;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Montserrat',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.55;
  font-size:16px;
  font-weight:400;
}
::selection{background:var(--yellow);color:var(--ink)}
img{max-width:100%;display:block}

/* HEADER */
header.app-header{
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:18px 32px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;top:0;z-index:100;
  gap:24px;
}
.brand{display:flex;align-items:center;gap:14px}
.brand-mark{
  width:40px;height:40px;
  background:var(--burgundy);
  display:grid;place-items:center;
  color:#fff;font-weight:900;font-size:20px;
  letter-spacing:-0.05em;
}
.brand-text h1{
  font-size:13px;font-weight:800;color:var(--burgundy);
  text-transform:uppercase;letter-spacing:0.08em;
  line-height:1.2;
}
.brand-text .sub{
  font-size:10px;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.12em;
  font-weight:500;margin-top:2px;
}
.search-wrap{position:relative;flex:1;max-width:380px}
.search{
  width:100%;
  background:var(--bg);
  border:1px solid var(--border);
  padding:11px 14px 11px 38px;
  font-family:inherit;font-size:13px;
  color:var(--ink);
  font-weight:500;
  transition:.15s;
}
.search:focus{outline:none;border-color:var(--burgundy);background:#fff}
.search::placeholder{color:var(--muted);font-weight:400}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}
.exam-countdown{
  font-size:11px;font-weight:700;color:var(--burgundy);
  text-transform:uppercase;letter-spacing:0.1em;
  border-left:3px solid var(--yellow);
  padding-left:12px;
  white-space:nowrap;
}
.exam-countdown small{display:block;color:var(--muted);font-weight:500;letter-spacing:0.05em;margin-top:2px;font-size:9px}

/* NAV */
nav.app-nav{
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:0 32px;
  display:flex;
  gap:0;
  overflow-x:auto;
  position:sticky;top:79px;z-index:99;
}
nav.app-nav button{
  background:none;border:none;
  padding:14px 20px;
  font-family:inherit;
  font-size:11px;font-weight:700;
  color:var(--muted);
  text-transform:uppercase;letter-spacing:0.1em;
  cursor:pointer;
  border-bottom:3px solid transparent;
  white-space:nowrap;
  transition:.15s;
  position:relative;
}
nav.app-nav button:hover{color:var(--burgundy)}
nav.app-nav button.active{color:var(--burgundy);border-bottom-color:var(--burgundy)}
nav.app-nav button .badge{
  display:inline-block;
  background:var(--yellow);
  color:var(--ink);
  font-size:9px;
  padding:1px 5px;
  margin-left:6px;
  font-weight:800;
  vertical-align:middle;
}

/* MAIN */
main{max-width:1100px;margin:0 auto;padding:40px 32px 80px}
.view{display:none;animation:fadeIn .25s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* TYPOGRAPHY */
h2.session-title{
  font-size:42px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:-0.01em;
  line-height:1.05;
  color:var(--burgundy);
  margin-bottom:8px;
}
.session-meta{
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.12em;
  font-weight:600;
  margin-bottom:32px;
  padding-bottom:24px;
  border-bottom:1px solid var(--border);
}
.session-meta strong{color:var(--burgundy)}
h3.section-title{
  font-size:13px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:0.12em;
  color:var(--burgundy);
  margin:48px 0 16px;
  padding-left:12px;
  border-left:3px solid var(--burgundy);
}
h4.subsection-title{
  font-size:18px;
  font-weight:700;
  color:var(--ink);
  margin:24px 0 10px;
}
p{margin-bottom:14px;color:var(--ink)}
p.lede{font-size:17px;color:var(--muted);font-weight:400;margin-bottom:24px;line-height:1.6}
ul,ol{padding-left:22px;margin-bottom:14px}
li{margin:6px 0}
strong{font-weight:700}
em{font-style:italic;color:var(--burgundy-dark)}
code{font-family:'JetBrains Mono',monospace;font-size:13px;background:var(--cream);padding:2px 6px;color:var(--burgundy-dark)}

/* SURLIGNAGE — bordeaux transparent, sobre */
.hl{background:rgba(94,25,55,0.10);padding:2px 5px;font-weight:700;color:var(--burgundy-dark);box-decoration-break:clone;-webkit-box-decoration-break:clone}
.hl-strong{background:rgba(94,25,55,0.18);padding:2px 5px;font-weight:700;color:var(--burgundy-dark)}

/* CARDS */
.card{
  background:#fff;
  border:1px solid var(--border);
  padding:24px 28px;
  margin:16px 0;
  transition:.2s;
}
.card.accent{border-left:4px solid var(--burgundy)}
.card.warn{border-left:4px solid var(--yellow)}
.card.tip{border-left:4px solid var(--green)}
.card:hover{box-shadow:0 4px 16px rgba(94,25,55,.06);transform:translateY(-1px)}
.card .label{
  font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.15em;
  color:var(--burgundy);
  margin-bottom:8px;
}
.card.warn .label{color:#9c7400}
.card.tip .label{color:#006b56}

/* PEDAGOGICAL CALLOUTS */
.callout{
  border:1px solid var(--border-strong);
  padding:18px 22px;
  margin:18px 0;
  background:#fff;
  position:relative;
}
.callout::before{
  content:'';
  position:absolute;
  left:0;top:0;bottom:0;width:4px;
}
.callout.intuition::before{background:var(--burgundy)}
.callout.example::before{background:var(--green)}
.callout.warning::before{background:var(--yellow)}
.callout.test::before{background:var(--burgundy-dark)}
.callout-label{
  font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.18em;
  color:var(--burgundy);
  margin-bottom:8px;
  display:flex;align-items:center;gap:8px;
}
.callout.warning .callout-label{color:#9c7400}
.callout.example .callout-label{color:#006b56}

/* TABLES */
table{
  width:100%;
  border-collapse:collapse;
  margin:18px 0;
  font-size:14px;
  background:#fff;
  border:1px solid var(--border);
}
th,td{
  padding:12px 14px;
  text-align:left;
  border-bottom:1px solid var(--border);
  vertical-align:top;
}
th{
  background:var(--burgundy);
  color:#fff;
  font-weight:700;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.08em;
}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:#fdfcf9}

/* IMAGES (slides extraites) */
.slide-img{
  border:1px solid var(--border);
  margin:18px 0;
  background:#fff;
  padding:8px;
}
.slide-caption{
  font-size:11px;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.1em;
  font-weight:600;
  margin-top:-8px;margin-bottom:18px;
}

/* HOMEPAGE */
.hero{
  background:var(--burgundy);
  color:#fff;
  padding:48px 40px;
  margin-bottom:32px;
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:0;right:0;
  width:80px;height:40px;background:var(--yellow);
}
.hero::after{
  content:'';position:absolute;top:40px;right:80px;
  width:40px;height:24px;background:var(--burgundy-dark);
}
.hero h1{
  font-size:56px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:-0.02em;
  line-height:0.95;
  margin-bottom:12px;
}
.hero .tag{
  font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.18em;
  opacity:0.8;margin-bottom:16px;
}
.hero p{font-size:18px;color:rgba(255,255,255,.9);font-weight:400;max-width:600px;margin:0}

/* PROGRESS DASHBOARD */
.progress-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:16px;
  margin:24px 0;
}
.progress-card{
  background:#fff;
  border:1px solid var(--border);
  padding:20px;
  text-align:center;
  cursor:pointer;
  transition:.2s;
}
.progress-card:hover{border-color:var(--burgundy);transform:translateY(-2px)}
.progress-ring{
  width:80px;height:80px;margin:0 auto 12px;
  position:relative;
}
.progress-ring svg{transform:rotate(-90deg)}
.progress-ring circle{fill:none;stroke-width:6}
.progress-ring .bg{stroke:var(--cream)}
.progress-ring .fg{stroke:var(--burgundy);stroke-linecap:square;transition:stroke-dashoffset 1s ease}
.progress-ring .pct{
  position:absolute;inset:0;display:grid;place-items:center;
  font-size:18px;font-weight:800;color:var(--burgundy);
}
.progress-card .name{
  font-size:11px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.1em;
  color:var(--burgundy);
  margin-bottom:4px;
}
.progress-card .desc{font-size:11px;color:var(--muted);font-weight:500;line-height:1.4}

/* TOC */
.toc-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:14px;
  margin:24px 0;
}
.toc-card{
  background:#fff;
  border:1px solid var(--border);
  border-left:4px solid var(--burgundy);
  padding:20px 22px;
  cursor:pointer;
  transition:.2s;
  text-align:left;
  font-family:inherit;
  display:block;
  width:100%;
}
.toc-card:hover{
  background:#fdfcf9;
  transform:translateY(-2px);
  box-shadow:0 4px 16px rgba(94,25,55,.06);
}
.toc-card .num{
  font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.15em;
  color:var(--burgundy);margin-bottom:6px;
}
.toc-card .title{
  font-size:15px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.02em;
  color:var(--ink);margin-bottom:6px;
  line-height:1.3;
}
.toc-card .desc{font-size:12px;color:var(--muted);font-weight:500;line-height:1.5}

/* EXAM-READY BLOC */
.exam-ready{
  background:var(--burgundy);
  color:#fff;
  padding:32px 36px;
  margin:32px 0;
  position:relative;
}
.exam-ready::before{
  content:'';position:absolute;top:0;right:0;
  width:60px;height:30px;background:var(--yellow);
}
.exam-ready .label{
  font-size:11px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.18em;
  color:var(--yellow);margin-bottom:8px;
}
.exam-ready h3{
  font-size:24px;font-weight:800;
  text-transform:uppercase;letter-spacing:-0.01em;
  margin-bottom:16px;color:#fff;
  border:none;padding:0;
}
.exam-ready ul{padding-left:20px}
.exam-ready ul li{margin:8px 0}
.exam-ready ul li::marker{color:var(--yellow)}
.exam-ready strong{color:var(--yellow)}

/* FLASHCARDS */
.fc-container{max-width:640px;margin:32px auto}
.flashcard{
  perspective:1500px;
  height:320px;
  cursor:pointer;
  margin-bottom:20px;
}
.fc-inner{
  position:relative;width:100%;height:100%;
  transform-style:preserve-3d;
  transition:transform .7s cubic-bezier(0.4,0,0.2,1);
}
.flashcard.flipped .fc-inner{transform:rotateY(180deg)}
.fc-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  padding:36px 40px;
  display:flex;flex-direction:column;justify-content:center;
}
.fc-front{
  background:var(--burgundy);
  color:#fff;
}
.fc-front::before{
  content:'';position:absolute;top:0;right:0;
  width:60px;height:30px;background:var(--yellow);
}
.fc-front .kicker{
  font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.18em;
  color:var(--yellow);margin-bottom:12px;
}
.fc-front .question{
  font-size:22px;font-weight:700;line-height:1.3;
}
.fc-front .hint{
  position:absolute;bottom:24px;left:40px;
  font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.15em;
  opacity:.6;
}
.fc-back{
  background:#fff;
  border:2px solid var(--burgundy);
  transform:rotateY(180deg);
  overflow-y:auto;
}
.fc-back .kicker{
  font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.18em;
  color:var(--burgundy);margin-bottom:12px;
}
.fc-back .answer{font-size:15px;line-height:1.6;color:var(--ink)}
.fc-back .answer strong{color:var(--burgundy)}

.fc-controls{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;margin-top:8px;
}
.fc-counter{
  font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.12em;
  color:var(--muted);
}
.fc-counter strong{color:var(--burgundy)}

/* BUTTONS */
.btn{
  background:var(--burgundy);
  color:#fff;
  border:none;
  padding:13px 26px;
  font-family:inherit;
  font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.12em;
  cursor:pointer;
  transition:.15s;
}
.btn:hover{background:var(--burgundy-dark)}
.btn.ghost{
  background:transparent;
  color:var(--burgundy);
  border:1px solid var(--burgundy);
}
.btn.ghost:hover{background:var(--burgundy);color:#fff}
.btn.sm{padding:9px 18px;font-size:10px}

/* QUIZ */
.quiz-q{
  background:#fff;
  border:1px solid var(--border);
  padding:22px 26px;
  margin:18px 0;
}
.quiz-q .qmeta{
  font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.15em;
  color:var(--muted);margin-bottom:8px;
}
.quiz-q .qtxt{font-size:16px;font-weight:600;margin-bottom:16px;line-height:1.4}
.quiz-opt{
  display:block;width:100%;text-align:left;
  background:#fff;
  border:1px solid var(--border);
  padding:12px 16px;
  margin:8px 0;
  font-family:inherit;font-size:14px;
  cursor:pointer;
  transition:.15s;
  font-weight:500;
  color:var(--ink);
}
.quiz-opt:hover{border-color:var(--burgundy);background:#fdfcf9}
.quiz-opt.selected{border-color:var(--burgundy);background:#fdf6f0}
.quiz-opt.correct{border-color:var(--green);background:#f0fbf6;font-weight:700}
.quiz-opt.correct::after{content:' ✓';color:var(--green);font-weight:800}
.quiz-opt.incorrect{border-color:var(--red);background:#fef0ee}
.quiz-opt.incorrect::after{content:' ✗';color:var(--red);font-weight:800}
.quiz-opt.disabled{cursor:default}
.quiz-explain{
  margin-top:12px;
  padding:12px 16px;
  background:var(--cream);
  border-left:3px solid var(--burgundy);
  font-size:13px;line-height:1.55;
  display:none;
}
.quiz-explain.show{display:block}
.quiz-explain strong{color:var(--burgundy)}
.quiz-score{
  position:sticky;bottom:20px;
  background:var(--burgundy);
  color:#fff;
  padding:16px 24px;
  display:flex;justify-content:space-between;align-items:center;
  margin-top:24px;
  box-shadow:0 -4px 16px rgba(0,0,0,.12);
}
.quiz-score .score-label{
  font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.15em;
  color:var(--yellow);
}
.quiz-score .score-value{
  font-size:22px;font-weight:800;
  font-family:'JetBrains Mono',monospace;
}

/* GLOSSARY */
.gloss-search{
  width:100%;
  background:#fff;
  border:1px solid var(--border);
  padding:13px 16px;
  font-family:inherit;font-size:14px;
  margin-bottom:20px;
  font-weight:500;
}
.gloss-search:focus{outline:none;border-color:var(--burgundy)}
.gloss-item{
  background:#fff;
  border:1px solid var(--border);
  border-left:3px solid var(--burgundy);
  padding:16px 22px;
  margin:8px 0;
}
.gloss-item .term{
  font-size:13px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.08em;
  color:var(--burgundy);
  margin-bottom:6px;
}
.gloss-item .def{font-size:14px;color:var(--ink);line-height:1.55}

/* SEARCH RESULTS */
.search-hit-card{
  background:#fff;border:1px solid var(--border);
  border-left:3px solid var(--burgundy);
  padding:18px 22px;margin:10px 0;
}
.search-hit-card .ctx{
  font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.15em;
  color:var(--burgundy);margin-bottom:8px;
}
.search-hit-card .snip{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:10px}
.search-hit{background:var(--yellow);padding:0 2px;font-weight:700;color:var(--ink)}

/* FOOTER */
footer{
  text-align:center;
  padding:32px;
  color:var(--muted);
  font-size:10px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.15em;
  border-top:1px solid var(--border);
  margin-top:48px;
}
footer .unleash{
  display:block;
  font-size:14px;font-weight:800;
  color:var(--burgundy);
  margin-bottom:8px;
  letter-spacing:0.05em;
}

/* RESPONSIVE */
@media(max-width:768px){
  header.app-header{padding:14px 18px;flex-wrap:wrap;gap:12px}
  .search-wrap{order:3;flex:1 0 100%}
  nav.app-nav{padding:0 18px;top:130px}
  main{padding:24px 18px 60px}
  h2.session-title{font-size:32px}
  .hero{padding:32px 24px}
  .hero h1{font-size:40px}
}

/* PRINT */
@media print{
  header.app-header,nav.app-nav,.fc-controls,.btn,.quiz-score{display:none}
  .view{display:block!important;page-break-after:always}
  .card,.callout{break-inside:avoid}
  body{background:#fff}
}
</style>
</head>
<body>

<header class="app-header">
  <div class="brand">
    <div class="brand-mark">E</div>
    <div class="brand-text">
      <h1>Marketing Research Methods</h1>
      <div class="sub">EDHEC Business School · S2 2026</div>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search" id="search" placeholder="RECHERCHER (CRONBACH, ANOVA, BIAIS...)"/>
  </div>
  <div class="exam-countdown" id="countdown">
    EXAMEN FINAL
    <small>30 AVRIL 2026 · 90 MIN</small>
  </div>
</header>

<nav class="app-nav" id="nav"></nav>

<main id="main"></main>

<footer>
  <div class="unleash">UNLEASH TOMORROW</div>
  EDHEC BUSINESS SCHOOL · MARKETING RESEARCH METHODS · S2 2026
</footer>

<script>
// ============ CONFIG ============
const SESSIONS = [
  {id:'home',label:'Accueil'},
  {id:'s1',label:'S1 · Quali',badge:'V1'},
  {id:'s2',label:'S2 · Quanti',badge:'V1'},
  {id:'s3',label:'S3 · Pratique',badge:'V1'},
  {id:'s4',label:'S4 · Qualtrics',badge:'WIP'},
  {id:'s6',label:'S6 · Analyse',badge:'WIP'},
  {id:'glossary',label:'Glossaire'},
  {id:'flashcards',label:'Flashcards'},
  {id:'quiz',label:'Quiz examen'}
];

// Progress par session (% mastery — placeholder, à brancher plus tard sur résultats quiz)
const PROGRESS = {s1:30,s2:25,s3:60,s4:0,s6:0};

// ============ HOMEPAGE ============
const VIEWS = {};

VIEWS.home = `
<div class="hero">
  <div class="tag">FICHES DE RÉVISION · CUTTING-EDGE</div>
  <h1>Marketing<br>Research<br>Methods</h1>
  <p>Toutes les fiches du cours, en pédagogie active. Hook → intuition → exemple → piège → test toi. Construit à partir des 5 PDFs officiels (S1, S2, S3, S4, S6).</p>
</div>

<h2 class="session-title">S2 · Méthodes Quantitatives</h2>
<div class="session-meta">64 SLIDES · LECTURE LOURDE · <strong>STATUT : COMPLET</strong></div>

<div class="callout intuition">
<div class="callout-label">🎯 Hook</div>

</div>

<h3 class="section-title">1. Surveys vs Expériences — la grande division</h3>
<table>
<tr><th>Critère</th><th>Survey</th><th>Expérience</th></tr>
<tr><td><strong>Question</strong></td><td>Quelles relations existent ?</td><td>X cause-t-il Y ?</td></tr>
<tr><td><strong>Manipulation IV</strong></td><td>Non (mesure passive)</td><td>Oui (active)</td></tr>
<tr><td><strong>Random assignment</strong></td><td>Non</td><td>Oui</td></tr>
<tr><td><strong>Inférence</strong></td><td>Corrélation</td><td><strong>Causalité</strong></td></tr>
</table>

<h3 class="section-title">2. Structure d'un survey rigoureux</h3>
<ol>
<li>Introduction / Consentement</li>
<li>Screening</li>
<li>Questions comportementales</li>
<li>Questions attitudinales</li>
<li>Variables principales</li>
<li>Démographiques</li>
<li>Debriefing</li>
</ol>
<div class="callout warning">
<div class="callout-label">⚠️ Règle critique</div>
<p>Tous les <strong>quality checks</strong> (attention, manipulation, realism) sont placés <span class="hl">APRÈS la VD</span> pour éviter le priming. Sinon tu alertes le participant et tu biaises sa réponse.</p>
</div>

<h3 class="section-title">3. Échelles de mesure</h3>
<table>
<tr><th>Échelle</th><th>Quand l'utiliser</th></tr>
<tr><td><strong>Likert (1–5/1–7)</strong> ⭐</td><td>Standard sciences sociales</td></tr>
<tr><td>Différentiel sémantique</td><td>Bipolaire (chaud–froid)</td></tr>
<tr><td>Choix multiples</td><td>Démographiques, options exclusives</td></tr>
<tr><td>Rank order</td><td>Forcer les priorités</td></tr>
<tr><td>VAS (slider)</td><td>Mesure continue précise</td></tr>
<tr><td>Open-ended</td><td>Exploration, citations</td></tr>
</table>

<h3 class="section-title">4. Cronbach's alpha & opérationnalisation</h3>
<div class="card accent">
<p><strong>Concept ≠ Variable</strong>. L'opérationnalisation, c'est le pont entre l'idée abstraite et la mesure concrète.</p>
<p>Exemple : <em>Brand Trust</em> (Delgado-Ballester, 2004) → 2 items Likert.</p>
<p>Pour combiner plusieurs items, vérifier <strong>Cronbach's α ≥ 0.7</strong>.</p>
</div>

<h3 class="section-title">5. Biais courants</h3>
<table>
<tr><th>Biais</th><th>Description</th><th>Solution</th></tr>
<tr><td><strong>Social Desirability</strong></td><td>Réponses socialement acceptables</td><td>Anonymat, formulation neutre</td></tr>
<tr><td><strong>Acquiescence</strong></td><td>Tendance à approuver</td><td>Reverse-coded items</td></tr>
<tr><td><strong>Common Method</strong></td><td>Même méthode → corrélations gonflées</td><td>Méthodes différentes</td></tr>
<tr><td><strong>Straightlining</strong></td><td>Même réponse partout</td><td>Attention checks + reverse</td></tr>
</table>

<h3 class="section-title">6. Designs expérimentaux : les 3 piliers</h3>
<div class="card accent">
<p>Une bonne expérience repose sur :</p>
<ol>
<li><strong>Manipulation</strong> de la variable indépendante</li>
<li><strong>Random assignment</strong> aux conditions</li>
<li><strong>Contrôle</strong> des variables externes</li>
</ol>
<p style="margin-top:8px"><span class="hl">X (IV) ━[Causal]━&gt; Y (VD)</span></p>
</div>

<h3 class="section-title">7. Corrélation ≠ Causalité</h3>
<div class="callout warning">
<div class="callout-label">⚠️ Exemples célèbres</div>
<ul>
<li><strong>Chocolat & Nobel</strong> : confondante = richesse nationale</li>
<li><strong>Glaces & noyades</strong> : confondante = chaleur de l'été</li>
</ul>
</div>
<p><strong>Les 3 conditions pour la causalité</strong> :</p>
<ol>
<li><strong>Covariation</strong> : X et Y bougent ensemble</li>
<li><strong>Précédence temporelle</strong> : X précède Y</li>
<li><strong>Pas d'explications alternatives</strong> : variables externes contrôlées</li>
</ol>

<h3 class="section-title">8. Random Sampling vs Random Assignment</h3>
<div class="callout warning">
<div class="callout-label">⚠️ Souvent confondu à l'examen</div>
</div>
<table>
<tr><th></th><th>Random Sampling</th><th>Random Assignment</th></tr>
<tr><td><strong>Concerne</strong></td><td>Sélection des participants</td><td>Allocation aux conditions</td></tr>
<tr><td><strong>Garantit</strong></td><td>Représentativité</td><td>Comparabilité des groupes</td></tr>
<tr><td><strong>Protège</strong></td><td>Validité externe</td><td><strong>Validité interne</strong></td></tr>
</table>
<p>Pour la <strong>causalité</strong>, le random assignment est prioritaire.</p>

<h3 class="section-title">9. Between vs Within Subjects</h3>
<table>
<tr><th></th><th>Between-Subjects</th><th>Within-Subjects</th></tr>
<tr><td><strong>Principe</strong></td><td>Une seule condition par participant</td><td>Toutes les conditions par participant</td></tr>
<tr><td><strong>Avantage</strong></td><td>Pas de carryover, validité interne</td><td>Plus de puissance statistique</td></tr>
<tr><td><strong>Inconvénient</strong></td><td>Plus de participants requis</td><td>Order effects, fatigue</td></tr>
</table>
<p>Cas <strong>WWF</strong> (S4/S6) = between-subjects, 4 conditions × 30 participants = 120.</p>

<h3 class="section-title">10. Designs factoriels (2×2 et plus)</h3>
<div class="callout example">
<div class="callout-label">🎯 Exemple Garvey, Kim & Duhachek (2021, JM)</div>
<p><em>"Bad News? Send an AI. Good News? Send a Human."</em></p>
<ul>
<li><strong>IV1</strong> : Type d'agent (AI vs Humain)</li>
<li><strong>IV2</strong> : Valence (Bonne vs Mauvaise nouvelle)</li>
<li><strong>VD</strong> : Réaction du consommateur</li>
</ul>
<p><strong>Résultat : interaction !</strong> Pas d'effet principal du type d'agent, mais bad news → consommateurs préfèrent l'AI ; good news → préfèrent l'humain. <span class="hl">L'effet DÉPEND de la valence.</span></p>
</div>

<h3 class="section-title">11. Validité interne — 7 menaces</h3>
<table>
<tr><th>Menace</th><th>Description</th></tr>
<tr><td><strong>Selection</strong></td><td>Différences pré-existantes (sol : random assignment)</td></tr>
<tr><td><strong>History</strong></td><td>Événements externes pendant l'expé</td></tr>
<tr><td><strong>Maturation</strong></td><td>Changements naturels (fatigue, apprentissage)</td></tr>
<tr><td><strong>Testing</strong></td><td>Mesure antérieure influence les suivantes</td></tr>
<tr><td><strong>Instrumentation</strong></td><td>Changement dans les instruments de mesure</td></tr>
<tr><td><strong>Statistical Regression</strong></td><td>Scores extrêmes reviennent vers la moyenne</td></tr>
<tr><td><strong>Attrition (Mortality)</strong></td><td>Dropout différentiel entre conditions</td></tr>
</table>

<h3 class="section-title">12. Validité interne ⇄ externe : le trade-off</h3>
<div class="callout intuition">
<div class="callout-label">💡 Intuition</div>
<p><strong>Lab</strong> = contrôle élevé, réalisme faible (validité interne).<br><strong>Field</strong> = réalisme élevé, contrôle faible (validité externe).<br>Best practice : <strong>multi-études</strong> combinant les deux.</p>
</div>
<div class="card tip">
<div class="label">🎯 Goldstein, Cialdini & Griskevicius (2008, JCR)</div>
<p>Field experiment dans de vrais hôtels. IV manipulée = panneau dans la chambre. <em>"75% of guests in this room reuse their towels"</em> a augmenté la réutilisation de <span class="hl">+33%</span> vs message standard.</p>
</div>

<h3 class="section-title">13. p-value & significativité</h3>
<table>
<tr><td><strong>p &lt; 0.001</strong></td><td>Très forte (***)</td></tr>
<tr><td><strong>p &lt; 0.01</strong></td><td>Forte (**)</td></tr>
<tr><td><strong>p &lt; 0.05</strong></td><td><span class="hl">Suffisante (*) — seuil standard</span></td></tr>
<tr><td><strong>p &gt; 0.05</strong></td><td>Non significatif</td></tr>
</table>
<div class="callout warning">
<div class="callout-label">⚠️ Piège sémantique</div>

<h3 class="section-title">14. Moderation & Mediation</h3>
<div class="card">
<p>Une expé basique répond à <strong>"Does it work?"</strong>. Une bonne recherche pose plus :</p>
<ul>
<li><strong>HOW</strong> ça marche ? → <strong>Mediation</strong> (mécanisme psychologique)</li>
<li><strong>FOR WHOM</strong> ça marche ? → <strong>Moderation</strong> (boundary conditions)</li>
</ul>
</div>
<div class="callout example">
<div class="callout-label">🎯 Pour Matrix</div>
<ul>
<li><strong>Moderation</strong> : <em>"Notre campagne marche, MAIS uniquement pour [segment]"</em></li>
<li><strong>Mediation</strong> : <em>"Notre campagne marche PARCE QU'elle déclenche [processus]"</em></li>
</ul>
</div>

<h3 class="section-title">15. A/B Testing & cas Obama 2012</h3>
<div class="card">
<p><strong>500+ A/B tests</strong> sur le site de campagne. Total : 1 milliard $ levés (690M $ digital), +379% vs Romney. Conversion dons +49%, sign-ups +161%.</p>
<p><em>"Experiment early and often"</em> — décision data-driven.</p>
</div>

<div class="exam-ready">

<ul>
<li><strong>Surveys</strong> mesurent les relations · <strong>Expériences</strong> établissent la causalité</li>

<li><strong>3 conditions causalité</strong> : covariation + précédence + pas d'alternative</li>
<li><strong>Random assignment ≠ random sampling</strong> (interne vs externe)</li>
<li><strong>Cronbach α ≥ 0.7</strong>, p < 0.05 standard</li>
<li><strong>4 biais</strong> : Social Desirability, Acquiescence, Common Method, Straightlining</li>
<li><strong>7 menaces validité interne</strong> : Selection, History, Maturation, Testing, Instrumentation, Stat Regression, Attrition</li>
<li><strong>Mediation = HOW · Moderation = FOR WHOM</strong></li>

<li>Garvey (2021) : interaction AI/Humain × Bad/Good news</li>
</ul>
</div>
`;

// ============ GLOSSARY ============
const GLOSSARY = [
  {term:"A/B Testing",def:"Expérience où 2+ versions d'une variable sont présentées à des groupes comparables. Cas Obama 2012 : 500+ tests, +49% conversions de dons."},
  {term:"Acquiescence Bias",def:"Tendance à approuver les affirmations indépendamment du contenu. Solution : reverse-coded items."},
  {term:"ANOVA (One-way)",def:"Compare les moyennes entre 3+ groupes. IV nominal, DV métrique. Output clé : F, df, p-value."},
  {term:"Attrition (Mortality)",def:"Dropout systématique de participants pendant l'expérience, surtout s'il diffère selon les conditions. Menace majeure à la validité interne."},
  {term:"Between-subjects design",def:"Chaque participant n'est exposé qu'à UNE seule condition. Pas de carryover. Cas WWF = between-subjects."},
  {term:"Cronbach's Alpha (α)",def:"Mesure de consistance interne d'une échelle multi-items. Seuils : ≥0.9 excellent, ≥0.8 bon, ≥0.7 acceptable (standard)."},
  {term:"Data Saturation",def:"Point où la collecte qualitative ne produit plus que de la redondance. Critère principal d'arrêt (Moser & Korstjens, 2018)."},
  {term:"Double-barreled Question",def:"Question piège qui en contient deux : 'Cette marque est innovante ET fiable ?'. À éviter."},
  {term:"External Validity",def:"Capacité des findings à se généraliser à d'autres populations, contextes, époques, opérationnalisations. Protégée par random sampling et réplications."},
  {term:"Factorial Design (2×2)",def:"Test simultané de 2+ IV. Permet d'identifier main effects + interactions. Ex : Garvey et al. 2021 (AI vs Humain × Bad/Good news)."},
  {term:"Field Experiment",def:"Expérience menée dans un environnement naturel (ex : Goldstein 2008 dans de vrais hôtels). Validité externe haute, contrôle moindre."},
  {term:"Focus Group",def:"Interview de 6-10 personnes simultanément, menée par un modérateur. Durée 60-120 min. Sarstedt & Mooi (2019)."},
  {term:"Internal Validity",def:"Capacité à conclure que la manipulation IV cause l'effet observé sur la VD. Protégée par random assignment, settings contrôlés, manipulation checks."},
  {term:"Interaction Effect",def:"L'effet d'une IV dépend du niveau d'une autre IV. Souvent les findings les plus intéressants. Ex : effet du type d'agent dépend de la valence (Garvey 2021)."},
  {term:"Leading Question",def:"Question orientant la réponse : 'Vous êtes d'accord que…?'. À éviter."},
  {term:"Levene's Test",def:"Test de l'homogénéité des variances (assumption ANOVA). p > 0.05 = OK. p < 0.05 = utiliser Welch's ANOVA."},
  {term:"Likert Scale",def:"Échelle d'accord avec une affirmation (1-5 ou 1-7). La plus courante en marketing research."},
  {term:"Manipulation Check",def:"Question vérifiant que la manipulation a été perçue. Toujours placée APRÈS la VD pour éviter le priming."},
  {term:"Mediation",def:"Mécanisme psychologique entre IV et DV. Répond à la question HOW does it work?"},
  {term:"Moderation",def:"Boundary conditions : pour qui ou dans quel contexte l'effet est plus fort/faible. Répond à FOR WHOM does it work?"},
  {term:"Operationalization",def:"Passage du concept abstrait (Brand Trust) à la variable mesurable (2 items Likert). Définition conceptuelle → définition opérationnelle."},
  {term:"P-value",def:"Probabilité d'observer ce résultat (ou plus extrême) si H₀ est vraie. Seuil standard : p < 0.05."},
  {term:"Pilot Test",def:"Test préliminaire d'un survey/expérience avant le lancement officiel. Vérifie clarté, timing, manipulation check."},
  {term:"Post-hoc Test",def:"Test après ANOVA significatif pour identifier QUELS groupes diffèrent. Tukey HSD = le plus courant et conservateur."},
  {term:"Purposive Sampling",def:"Sélection de participants selon un critère a priori (informateurs riches en information)."},
  {term:"Qualtrics",def:"Plateforme de design de surveys et expériences. Outil principal du cours pour la collecte quantitative."},
  {term:"Random Assignment",def:"Affecter les participants aux conditions au hasard. Protège la VALIDITÉ INTERNE. Probabiliste, pas déterministe."},
  {term:"Random Sampling",def:"Tirage aléatoire de participants depuis la population. Protège la VALIDITÉ EXTERNE (généralisation)."},
  {term:"Reverse-coded Item",def:"Item formulé à l'opposé du construct. Détecte straightlining et acquiescence."},
  {term:"Sample Saturation",def:"Voir 'Data Saturation'."},
  {term:"Semi-structured Interview",def:"Guide avec questions clés mais flexibilité dans formulation et follow-ups. Format standard pour Matrix."},
  {term:"Snowball Sampling",def:"Recrutement par référencement entre participants. Utile pour populations difficiles d'accès."},
  {term:"Social Desirability Bias",def:"Répondre de manière socialement acceptable. Solution : anonymat, formulation neutre."},
  {term:"SPSS",def:"Logiciel statistique IBM. Outil principal du cours pour ANOVA, régression."},
  {term:"Straightlining",def:"Sélectionner la même réponse partout. Détection : attention checks + reverse-coded."},
  {term:"Survey",def:"Méthode quantitative de collecte par questionnaire. Mesure des relations entre variables. Ne peut PAS établir la causalité."},
  {term:"Synthetic Data",def:"Données générées par IA (LLMs) pour remplacer des participants. Limites actuelles : hallucinations, ne simulent pas la psychologie humaine (Schröder et al. 2025)."},
  {term:"Taguette",def:"Outil gratuit collaboratif de codage qualitatif (app.taguette.org). Workflow : Import → Tag → Review → Export."},
  {term:"Thematic Analysis",def:"Approche qualitative en 6 phases (Braun & Clarke 2006) : familiarisation → codes initiaux → recherche thèmes → révision → définition → rédaction."},
  {term:"Tukey HSD",def:"Honestly Significant Difference (Tukey 1949). Test post-hoc le plus courant et conservateur. Contrôle le family-wise error rate."},
  {term:"Within-subjects design",def:"Chaque participant voit toutes les conditions. Plus puissant statistiquement mais risque de biais d'ordre."}
];

  {q:"Quel test statistique pour comparer les moyennes de 4 groupes (IV nominal, DV métrique) ?",opts:["t-test indépendant","One-way ANOVA","Régression linéaire","Chi-square"],correct:1,exp:"One-way ANOVA pour 3+ groupes. Pour 2 groupes seulement : t-test."},
  {q:"Que protège le random assignment ?",opts:["La validité externe","La validité interne","La fiabilité","La représentativité"],correct:1,exp:"Random assignment = validité interne (la conclusion causale est-elle correcte). Random sampling = validité externe (généralisation)."},
  {q:"Cas WWF : combien de participants au total après nettoyage ?",opts:["100","120","150","152"],correct:1,exp:"152 collectés - 21 incomplets - 11 sans consentement = 120 valides, soit 30 par condition."},
  {q:"Quelle est la 1ère phase de l'analyse thématique de Braun & Clarke ?",opts:["Recherche de thèmes","Codage initial","Familiarisation avec les données","Définition des thèmes"],correct:2,exp:"Les 6 phases : (1) Familiarisation, (2) Codes initiaux, (3) Recherche thèmes, (4) Révision, (5) Définition/nommage, (6) Rédaction."},
  {q:"Quel biais consiste à répondre la même chose à toutes les questions ?",opts:["Acquiescence","Social desirability","Straightlining","Common method"],correct:2,exp:"Straightlining = même réponse partout. Solution : attention checks + reverse-coded items."},
  {q:"Quel sampling consiste à recruter via les références d'anciens participants ?",opts:["Purposive","Convenience","Snowball","Stratified"],correct:2,exp:"Snowball sampling : sélection par référencements. Purposive = critère a priori. Convenience = accessibilité."},
  {q:"Qu'est-ce que la 'data saturation' en recherche qualitative ?",opts:["Quand on a trop de données pour analyser","Le point où les nouvelles données sont redondantes","Le nombre minimum de participants requis","La validité externe"],correct:1,exp:"Data saturation (Moser & Korstjens, 2018) : point où collecter plus de données ne produit que de la redondance."},
  {q:"Cas WWF : quelles campagnes ont généré le plus de dons ?",opts:["Panda et Deer","Rainforest et Rhino","Rainforest seulement","Toutes équivalentes"],correct:1,exp:"Rainforest (M=4.73€) et Rhino (M=3.93€) ont généré significativement plus que Panda (1.93€) et Deer (2.00€), p<.001."},
  {q:"Le test de Levene avec p = 0.30, qu'en conclure ?",opts:["Les variances diffèrent → Welch","Les variances sont égales → ANOVA standard OK","L'ANOVA est non significative","Il faut faire un post-hoc"],correct:1,exp:"p > 0.05 dans Levene = variances homogènes (assumption met) → ANOVA standard OK."},
  {q:"Quelles sont les 3 conditions pour établir la causalité ?",opts:["Random sampling, taille échantillon, fiabilité","Covariation, précédence temporelle, pas d'alternative","p<0.05, n>30, contrôle","Validité interne, externe, écologique"],correct:1,exp:"Les 3 conditions : (1) Covariation, (2) Précédence temporelle, (3) Pas d'explication alternative. Seules les expériences les atteignent toutes."},
  {q:"Quel test post-hoc est le plus courant après ANOVA ?",opts:["Bonferroni","Tukey HSD","Scheffé","Dunnett"],correct:1,exp:"Tukey HSD (Honestly Significant Difference, Tukey 1949) — le plus courant et conservateur. Contrôle le family-wise error rate."},
  {q:"Pourquoi utiliser des items reverse-coded ?",opts:["Pour rendre le survey plus court","Pour détecter l'acquiescence et le straightlining","Pour augmenter Cronbach's alpha","Pour cacher la VD"],correct:1,exp:"Reverse-coded = items formulés à l'opposé. Détecte les répondants qui approuvent tout ou cochent la même réponse partout."},
  {q:"Qu'est-ce qu'une question 'double-barreled' ?",opts:["Une question avec deux options","Une question qui en contient deux distinctes","Une question à choix multiples","Une question sensible"],correct:1,exp:"Double-barreled = pose deux questions en une (ex : 'Cette marque est innovante ET fiable ?')."},
  {q:"Aaker (1997) a identifié combien de dimensions de personnalité de marque ?",opts:["3","5","7","10"],correct:1,exp:"5 dimensions : Sincerity, Excitement, Competence, Sophistication, Ruggedness."},
  {q:"Dans le cas Obama 2012, quel pourcentage d'augmentation des conversions de dons en ligne ?",opts:["+25%","+49%","+161%","+379%"],correct:1,exp:"+49% sur les conversions de dons. Sign-ups +161%. 500+ A/B tests menés. +379% c'est la performance vs Romney."},
  {q:"Cas WWF : pour la VD 'sense of responsibility', F(3,116)=1.875, p=.138. Conclusion ?",opts:["Effet significatif","Aucune différence significative","Il faut faire un post-hoc","Variances non homogènes"],correct:1,exp:"p = .138 > 0.05 → non significatif. Les 4 visuels ne produisent pas de différences en responsabilité."},
  {q:"Quel design garantit qu'un participant ne voit qu'UNE seule condition ?",opts:["Within-subjects","Between-subjects","Mixed","Factorial"],correct:1,exp:"Between-subjects = un participant, une condition. Within = chaque participant voit toutes les conditions."},
  {q:"Où placer les attention/manipulation checks dans un survey ?",opts:["Au tout début","Avant la VD","Après la VD","À la fin avec le debriefing"],correct:2,exp:"TOUJOURS APRÈS la VD pour éviter le priming. Sinon on alerte le participant et on biaise sa réponse."},
  {q:"Quel outil est utilisé pour le codage qualitatif dans le cours ?",opts:["NVivo","Atlas.ti","Taguette","MAXQDA"],correct:2,exp:"Taguette (app.taguette.org) — gratuit et collaboratif. Workflow : Import → Tag → Review → Export."},
  {q:"En sciences sociales, quelle valeur de R² est commune en régression ?",opts:["0.02–0.15","0.30–0.50","0.70–0.90","Toujours > 0.95"],correct:0,exp:"En sciences sociales, R² faible (0.02–0.15) est commun car les comportements humains sont multifactoriels."},
  {q:"Le rapport final du projet Matrix doit contenir combien de sections ?",opts:["5","6","8","10"],correct:2,exp:"8 sections : Intro, Design & collecte, Analyses, Interprétation, Conclusions/reco, Limitations, Références, Contributions individuelles."},
  {q:"Garvey, Kim & Duhachek (2021) ont trouvé quel pattern AI vs Humain ?",opts:["L'AI est toujours préférée","L'humain est toujours préféré","Une interaction : AI pour bad news, humain pour good news","Aucun effet"],correct:2,exp:"Interaction Type d'agent × Valence : bad news → AI préférée ; good news → humain préféré. Pas d'effet principal seul."},
  {q:"Goldstein, Cialdini & Griskevicius (2008) ont mesuré quelle augmentation de réutilisation des serviettes via norme sociale ?",opts:["+10%","+33%","+50%","+75%"],correct:1,exp:"+33% avec le message '75% of guests in this room reuse their towels' vs message standard environnemental."},
  {q:"Mediation répond à quelle question ?",opts:["WHAT","HOW","FOR WHOM","WHEN"],correct:1,exp:"Mediation = HOW does it work? (mécanisme psychologique). Moderation = FOR WHOM."},
  {q:"Quelle est la deadline de soumission du rapport Matrix ?",opts:["23h59 le jour de S8","23h59 la veille de S8","23h59 le jour de S9","Jour de l'examen final"],correct:1,exp:"Submit slides + report + data : 23h59 LA VEILLE de la Session 8. Pas le jour J."}
];

VIEWS.quiz = `
<h2 class="session-title">Quiz Examen Blanc</h2>
<div class="session-meta">${QUIZ.length} QCM AUTO-CORRIGÉS · TOUTES SESSIONS</div>
<p class="lede">Cliquer sur une option pour répondre. L'explication apparaît immédiatement.</p>
<div id="quiz-list"></div>
<div class="quiz-score">
  <div>
    <div class="score-label">Score</div>
    <div class="score-value" id="score-text">0 / 0</div>
  </div>
  <button class="btn ghost sm" onclick="resetQuiz()" style="background:transparent;color:#fff;border-color:#fff">RECOMMENCER</button>
</div>
`;

// ============ APP LOGIC ============
function buildNav(){
  document.getElementById('nav').innerHTML = SESSIONS.map(s=>{
    const badge = s.badge ? `<span class="badge">${s.badge}</span>` : '';
    return `<button data-id="${s.id}" onclick="go('${s.id}')">${s.label}${badge}</button>`;
  }).join('');
}

function go(id){
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
  document.getElementById('main').innerHTML = `<div class="view active">${VIEWS[id]||'<p>Section introuvable</p>'}</div>`;
  if(id==='glossary')renderGlossary('');
  if(id==='flashcards')initFlashcards();
  if(id==='quiz')renderQuiz();
  window.scrollTo({top:0,behavior:'smooth'});
}

// Glossary
function renderGlossary(filter){
  const list = document.getElementById('gloss-list');
  if(!list)return;
  const f = (filter||'').toLowerCase().trim();
  const items = GLOSSARY.filter(g=>!f||g.term.toLowerCase().includes(f)||g.def.toLowerCase().includes(f));
  list.innerHTML = items.length
    ? items.sort((a,b)=>a.term.localeCompare(b.term)).map(g=>`<div class="gloss-item"><div class="term">${g.term}</div><div class="def">${g.def}</div></div>`).join('')
    : '<p class="lede">Aucun résultat.</p>';
}

// Flashcards
let fcIdx=0, fcOrder=[...Array(FLASHCARDS.length).keys()];
function initFlashcards(){fcIdx=0;renderCard()}
function renderCard(){
  const card = FLASHCARDS[fcOrder[fcIdx]];
  const el = document.getElementById('fc'); if(!el)return;
  el.classList.remove('flipped');
  document.getElementById('fc-q').innerHTML = card.q;
  document.getElementById('fc-a').innerHTML = card.a;
  document.getElementById('fc-i').textContent = fcIdx+1;
}
function flipCard(){document.getElementById('fc').classList.toggle('flipped')}
function nextCard(e){if(e)e.stopPropagation();fcIdx=(fcIdx+1)%FLASHCARDS.length;renderCard()}
function prevCard(e){if(e)e.stopPropagation();fcIdx=(fcIdx-1+FLASHCARDS.length)%FLASHCARDS.length;renderCard()}
function shuffleCards(){fcOrder.sort(()=>Math.random()-.5);fcIdx=0;renderCard()}

// Quiz
let answered={};
function renderQuiz(){
  answered={};
  document.getElementById('quiz-list').innerHTML = QUIZ.map((q,i)=>`
    <div class="quiz-q" id="q${i}">
      <div class="qmeta">QUESTION ${i+1} / ${QUIZ.length}</div>
      <div class="qtxt">${q.q}</div>
      ${q.opts.map((o,j)=>`<button class="quiz-opt" onclick="answer(${i},${j})">${String.fromCharCode(65+j)}. ${o}</button>`).join('')}
      <div class="quiz-explain" id="exp${i}"><strong>Explication :</strong> ${q.exp}</div>
    </div>`).join('');
  updateScore();
}
function answer(qi,oi){
  if(answered[qi]!==undefined)return;
  answered[qi]=oi;
  const correct = QUIZ[qi].correct;
  document.querySelectorAll(`#q${qi} .quiz-opt`).forEach((el,idx)=>{
    el.classList.add('disabled');
    if(idx===correct)el.classList.add('correct');
    else if(idx===oi)el.classList.add('incorrect');
  });
  document.getElementById('exp'+qi).classList.add('show');
  updateScore();
}
function updateScore(){
  const total = Object.keys(answered).length;
  const correct = Object.entries(answered).filter(([k,v])=>QUIZ[k].correct===+v).length;
  document.getElementById('score-text').textContent = `${correct} / ${total}${total>0?` (${Math.round(correct/total*100)}%)`:''}`;
}
function resetQuiz(){renderQuiz();window.scrollTo({top:0,behavior:'smooth'})}

// Search
document.getElementById('search').addEventListener('input',e=>{
  const q = e.target.value.toLowerCase().trim();
  if(!q){go('home');return}
  let html = `<h2 class="session-title">Résultats : "${e.target.value}"</h2><div class="session-meta">RECHERCHE FULL-TEXT</div>`;
  const matches = [];
  Object.entries(VIEWS).forEach(([id,htmlContent])=>{
    if(['home','glossary','flashcards','quiz'].includes(id))return;
    const text = htmlContent.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ');
    const idx = text.toLowerCase().indexOf(q);
    if(idx>=0){
      const start = Math.max(0,idx-80), end = Math.min(text.length,idx+200);
      const snippet = text.slice(start,end).replace(new RegExp(q,'gi'),m=>`<span class="search-hit">${m}</span>`);
      const session = SESSIONS.find(s=>s.id===id);
      matches.push(`<div class="search-hit-card"><div class="ctx">${session.label}</div><div class="snip">…${snippet}…</div><button class="btn sm" onclick="document.getElementById('search').value='';go('${id}')">OUVRIR →</button></div>`);
    }
  });
  GLOSSARY.forEach(g=>{
    if(g.term.toLowerCase().includes(q)||g.def.toLowerCase().includes(q)){
      matches.push(`<div class="search-hit-card"><div class="ctx">GLOSSAIRE · ${g.term}</div><div class="snip">${g.def.replace(new RegExp(q,'gi'),m=>`<span class="search-hit">${m}</span>`)}</div></div>`);
    }
  });
  html += matches.length ? matches.join('') : '<p class="lede">Aucun résultat trouvé.</p>';
  document.getElementById('main').innerHTML = `<div class="view active">${html}</div>`;
});

// Init
buildNav();
go('home');
</script>
</body>
</html>
